  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0021_WYG_006-1a, image: WYG1035/WYG1035-0897a.png}
body:
  text: 鑒誡録巻六後蜀何光逺撰戲判作王蜀宋開府光嗣僥參樞衡紊亂時政所為嬌媚下筆縱横凡斷國章多為戲判用三軍為兒戲將萬幾為詭隨取笑四方結怨上下以至一身受戮後主遭誅良由君子退身閹人執政者也判行營將士申請裹糧云纔請冬賜又給行裝漢州咫尺要甚裹糧綿州物賤直到益昌又判内庭未事人云覔事撮嶺脚勾當須教了儻若有闕遺禁君直到老又判導江縣申狀封皮上著狀上門府衙𠡠如開府不是門府典押雙眇令佐單瞽量事書罰勝打十五令佐盤庚典押嵗取事了速歸用修􅅟宇又判小朝官郭延鈞進識字女子云進來便是宫人狀内猶言女子應見容止可觀遂令始制文字更遣阿母教招恨不太真相似且圖親近官家直向内庭求事又判神竒軍背軍官健李紹妻阿鄧乞判改嫁淡紅衫子赤輝輝不採燕脂不畫眉夫壻背軍縁甚事女人别嫁欲何為孤兒攜去君爭忍抵子歸來我不知若有支持且須守口中爭著兩張匙又判簡州刺史安太尉申院狀希須場云係州收𣙜安湖安湖空有鬚髭所見不逺智解全愚酒腸是太后教令問你還有耳孔也無又判内門捉得御厨雜使衙官偷肉云斤斤是官家物飽祭隴嗔更將出不能為食斬君頭領送右巡枷見骨産麒麟王蜀田尚父宗侃第三子太尉承肇生自雅安雅州之名小字獦獠兒其母崔氏初夢一人峩冠褒袖自稱周公山神牽一五色獸逼其裙下既驚且寤因而有孕焉後又加持崔和尚者忽自雅安來於成都打病瘟疫者尋差孿躄者立行指人亂言往往有據由是時童騃官者抱子著忩前和尚看之欣然撫其背曰怪來近日貧道所居之山氣色稍微其山之神孕夷於此此子麒麟之精也為王者之瑞焉官者以告其母曰往年夢中之獸今獲解之遂施和尚珠金以酬異說田後累遷郡守節制洋州蜀將之中頗聞兵法乃知異夢信而有祥者焉鬼坐衙前蜀軍使文大劍宗院下峽行迴至瀘州經方山廟以兵士平善還棹夜宿兹廟了其心願焉事饌者檢慎不謹未經獻熟有廟家狗潛於砧上盜物食焉文方暫偃息於廊廡間候其事辨俄聞廟堂内雷震一聲又有電數條繚繞廟中似尋怪物文與三十餘人潛匿無地忽見一人戴白冠衣白裳升堂而坐獠鬼多有走堦下者役有排立者莫知其數頃刻有鬼十數等皆披虎皮拘一着赤黄衫入至中庭鬼主責之曰豈有人間設食吾未受饗而竊之乎遂令杖之十五曳出廟門良乆鬼物聲影俱沈寂然如故文遂令㸃檢祭饌果少猪腸来早於廟籬外見一赤黄狗卧在草内䑛其臀瘡自後祭人轉加嚴敬又崔謀議鑾頃在瀘州禱允不應今於錦城之北奏置行廟時人號曰崔氏家神靈驗頗多不復盡録怪鳥應王蜀光天元年太祖寢疾經旬文洲進白鷹茂州貢白兔羣臣議曰聖上本命是兔鷹兔至甚相刑貢二禽非以為瑞退鷹留兔帝疾必痊勅命不從是嵗晏駕又通正年有大秃鶖鳥颺於摩訶池上顧太尉夐時為小臣直於内庭遂潛吟二十八字詠之近臣與顧有隙者上聞詔顧責之將行黜辱顧亦善對上遂捨之至光天元年帝崩乃秃鶖之徴也詩曰昔日曽㸔瑞應圖萬般祥異不如無摩訶池上分眀見子細㸔来是那鶘又有楊秘書義方者執性强良所為狂簡亦西南少俊之士也曽以筆硯見用於宋樞密光嗣因題九頭鳥宋疑楊見詠遂奏譴沈黎至咸康元年後主失位宋亦􅇜誅乃九頭鳥之應也詩曰三百禽中爾最靈就中惡爾九頭名數年雲外藏凶影此夜天邊發惡聲好惜羽毛還鬼窟莫留灾害與蒼生况當社稷延洪日不合鳴時莫亂鳴旌論衡釋道二門各宗教本雖分内外意曉筌蹄前蜀佑聖國師光業有過人之辨為僧門一端也威儀楊徳輝有出人之才為道門之一俊也至於問答論難不雙美武城中東川昌眀縣𤣥士李懐杲聚盜搆逆尋亦受誅普通山青州長老録二尼道姑道媪親事巾瓶時左街使集王宗輸奏聞收戡決遞遐方僧道俱有乖張嘲論各興亂謗非獨取笑理在其中光業徵李懐杲嘲道門云雲鏁涪江水似天文開懐果已升仙强思齊見應摧膽張茂卿聞必聳肩强與張三𤣥士三尺霜兄充絳節兩條朱棒替香煙報伊廣徳先生道社稷威靈不偶然山上擒来鎮􅂻收天然模様已成囚妄占氣色為徵兆更引文章說御樓長榜數張懸市内短刀一隊送江頭旋驅旋斬敎隨水只此名為志道流楊徳輝青州長老嘲僧門曰堪笑青州學坐禪不供父母不耕田口中雖道無諸相心􅂻元来有外縁行者趂敎門􅂻卧尼師留在脚頭眠髙標不使觀音救徒說三千與大千出家比要離生縁争是争名更在先說法漫稱獅子吼魅人多使野狐禪行婆餉送新童子居士抄條施利錢蠶食方民何所用轉教海内有荒田又太祖降誕日僧門祝辟支佛牙道門進武成混元圖光業詔圖以嘲之徳輝詔佛牙以答之議者以光業先興北郭之師徳輝報盡東門之役光業嘲進圖云夜深燈火滿壇鋪拔劍揮空亂叫呼黒撒半筐兵甲豆朱書一道厭人符重臣餧飼剛教活聖主慈悲未忍誅佛說毗盧三界内如何更有混元圖徳輝嘲佛牙云比来降誕為官家堪笑羣僧讚佛牙手軟阿師持磬鈸面甜童子執幡花縦饒黎庶無知識不可公王盡信邪捧擁一函枯骨立如何延得夀無涯後舉子劉𨼆辭詠之曰為僧為道兩悠悠若個能分聖主憂各鬭輪蹄朝紫殿盡稱卿監滿皇州相嘲相詠何時了争利争名早晩休閒想邊庭荷戈將功成猶自不封侯所以牛秘監嶠評之詩曰𤣥門清净等空門䖍奉天尊與世尊金口說經十二部𤣥王留教五千言鼇頭宫殿波濤濶鷲嶺香花夢想存莫向人間争勝負須知三教本同源神口開韋相公昭度出鎮西川陳太師敬瑄與監䕶田軍容令孜堅守城垣不伏除替韋於城南荷聖寺置行府制守三年而歸時王太祖建為行軍司馬忽夢一青衣神人大張其口及問小將山章章對曰青衣乃蜀之地名也亦有青衣之神其祠在平壘内今城中百姓則易子而食三軍則守城而哭可謂窮危之甚祠廟固乏蒸嘗今青衣之神口開是土地於公求饗亦是啟其唇齒露彼腹心之兆也其城夢後十日而降果如所說又雅州有周公山城之隅有周公廟廟有土偶康押衙即神之領袖也郡人所禱無不遂心唐大中初有任士元與宇文錯争田俱無公執雖經檢戡難定是非士元無計端的不甘理屈遂詣靈廟昇請康押衙親至田所祝曰若是宇文錯之地請神㸃頭如是士元之地請神開口𠖇心啟祝神口遂開宇文錯知非遂還其地士元因請鼓樂迎歸舊祠今郡人無不敬事儻有祭奠似帶酒容乃知神眀正直依人而行者也布燮朝南蠻所都之地號曰長和國呼宰相為布燮王蜀後主乾徳中南蠻選布燮段義宗判官贊衛姚吟等為使入蜀義宗不欲朝拜遂秃削為僧號曰大長和國尤街崇聖等賜紫沙門銀鉢既而届蜀羣臣議奏僧有佛法宜令禮拜義宗於是失節焉至于議論敷奏道理一歌一詠捷應如流有題大慈寺芍藥云浮花不與衆花同為感髙僧䕶法功繁蕊夜鋪方丈月異香朝散講筵風尋真自得心源静觀色非貪眼界空好是芳馨堪供養天敎生在釋門中又題三學院經樓云鷲嶺名園不可儔叨陪龍象喜登逰玉排複道珊瑚殿金錯危欄翡翠樓尚欲歸心求四諦敢辭施繞滿三周羲和鞭撻金烏疾俗網無由肯駐留又題曰當今積善競修崇七寳荘嚴作梵宫佛日眀時齊舜日皇風清處接慈風一乘妙理應難測萬刼良縁豈易窮共恨塵芳非法侣掉鞭歸去夕陽中又題判官贊衛有聽歌妓洞雲詩畧云稽叔夜鼓琴飲酒無閒暇若使當時聞此歌抛擲廣陵渾不謝劉伯倫劉伯倫虚生浪死過青春一飲一顧獨自醉無人為爾下梁塵又思鄉云塞北行人絶雲南信未還庭前花不掃門外栁誰攀坐乆消銀燭愁多減玉顔懸心秋夜月萬里照關山觀此製作實為髙手鑒誡録卷六
