body:
  text: 鑑戒錄小説家𩔖一雜事之屬提要臣等謹案鑑戒錄十巻蜀何光逺撰光逺字輝夫東海人孟昶廣政初官普川軍事判官其書多記唐及五代間事而蜀事為多皆近俳諧之言各以三字標題凡六十六則趙希弁讀書後志以為輯唐以來君臣事迹可為世鑑者似未覩其書因其名而臆説也舊本前有劉曦度序亦見希弁志宋史藝文志遂以劉曦度鑑戒錄三巻何光逺鑑戒錄三巻分為二書益舛誤矣書中間有夾注如判木夾一條云此答本夾書元是胡曾與路巖相公鎮蜀日修之非為髙駢相公也何光逺悞述危亂黜一條云據禪月詩集中此詩自哭涪州張侍郎非張拾遺何光逺錯舉證也四公㑹一條云此篇元在本事詩中叙説甚詳何光逺重取論説又加改易非也皆駁正光逺之説不知出自何人此本析為十巻有朱彛尊䟦稱從項于汴家宋本影寫則猶宋人所分也今觀所記如徐后事一條所載王承㫖詩後山詩話以為花蕊夫人作蜀門諷一條所載向瓉嘲蔣鍊師詩南唐近事以為廬山道士其語大同小異猶可曰𫝊聞異詞鑑寃辱一條全剽襲殷芸小説東方朔辨怪哉蟲事案小説已佚此條見太平廣記四百七十三已為附㑹鬼傳書一條不知水經注有梁孝直事更屬粗疏至逸士諌一條稱昭宗何后􅂽于從禽考新唐書后妃列𫝊昭宗奔播岐梁后侍膳服無須臾去舊唐書亦云后於蒙塵薄狩之中嘗膳禦侮不離左右安得有畋遊之事且昭宗寄命強藩不能自保又安能縱后畋遊恒至六十里外殊為誣誕灌鐵汁一條稱秦宗權本不欲叛乃太山神追其魂以酷刑逼之倡亂是為盜賊藉口尤不可以訓特以其為五代舊書所載軼事遺文往往可資采掇故仍錄之小説家焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e4f9cf90b6863a4888675e46807ef1deeb8a15f89dae6526a74e2c63904d6af5
