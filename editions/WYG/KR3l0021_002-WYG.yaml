body:
  text: 鑒誡録巻二後蜀何光逺撰御賜名朱太祖統四鎮除中令日名温與崔相國連搆大事崔每奏太祖忠赤委之闗東國無患矣昭宗遽勅太祖改名全忠議者曰全字人王也又在中心甚不可也近臣亦奏上方悔焉勅命既行追之勿及後果有大梁王帝之號是時四分天下其在中心乃賜名之應也逸士諌天復中昭宗播岐時梁太祖與秦王茂貞羽檄交馳欲迎車駕何皇后東川人恃其深寵不顧阽危酷好畋遊放㺯于兩舍之外傳三十里為一舍踐蹋苗稼百里飛埃有成州同谷山逸人戴一巨笠跨一青牛琴袋酒壺俱在牛上因稱同谷子不顯姓名直詣行朝上書二巻論十代興亡之事敘四方理亂之源帝覽其書數日減膳宣王驃騎數賜之酒食審彼賢愚同谷子唯吟太康失政之詩又説褒姒惑君之事何皇后慮失恩㫖潛令秦王誅之其事未行預已奔去後梁太祖舉四鎮之衆迫脅岐城大駕無依遂遷東洛議者以君王失政妃后禽荒逸士上書採而不用時將盡矣天使其然同谷子詠五子之歌詩曰邦惟固本自安寧臨下常須馭朽驚何事十旬遊不返禍胎從此構殷兵又曰酒色聲禽號四荒那堪峻宇又雕牆静思今古為君者未或因兹不滅亡又曰唯彼陶唐有冀方少年都不解思量如今筭得當時事首為盤遊亂紀綱又曰明明我祖萬邦君典則貽將示子孫惆悵太康荒墜後覆宗絶祀滅其門又曰仇讎萬姓遂無依顔厚何曾解忸怩五子既歌邦已失一場前事悔難追判木夾西山八國夐古已來為中國西南之患也自蜀武侯擒縱之後方通誠款唐鮮于仲通將領博海等軍六萬衆歿于鬼王之謀遂致姚蜑生心數侵黎巂良由非才也近又李福尚書鎮西川牛叢為貳車日南蠻直犯梓潼役陶匠二十萬燒塼欲塞劍門蜀有五丈天王者寶厯中所置也是時見大僧形于錦城之内蠻人百萬之衆悉皆奔竄後髙相公駢統臨益部兼號征南蠻陬聞名預自屏跡矣然時飛一木夾其中惟誇兵革犀象欲借綿錦之江飲馬濯足而已髙相公于是經營版築置防城勇士八千命胡記室曾以檄破之仍判迴木夾胡曾之檄天下稱為竒絶其辭云欲慕平交妄稀抗禮何異持衡秤地舉尺量天又答云越巂新州牂牁故地不在周封之内非居禹跡之中曩日邊將邀勛妄圖吞併得之如手加駢拇失之若頷去贅瘤九牛之落一毛六馬之亡半毳何足喻哉是以南蠻議曰成都近有良將未可圖焉于是烽燧無虞誠款繼至髙公稍恃功業似致驕矜凡剏規模有劉焉李特之志朝廷議奏遂除江陵復自江陵遷于淮海首冠諸侯有唐以來可謂英雄者矣判木夾云辭天出塞陣雲空霧巻霞開萬里通親受虎符安宇宙誓將龍劒定英雄殘霜敢冒髙懸日秋葉争禁大段風為報南蠻須屏跡不同蜀將武侯公破木夾云牒前件木夾萬里離南一别至北開緘捧讀辭藻煥然奬飾過多欣慰何極實以乍同邊鎮才到藩籬且按此朝之舊儀未委彼國之新制不知鶴詔唯認苴咩尚呼南詔之佳名豈見大朝之美號要從微耗且是所宜伏承驛信王化風行君徳雲被彫題屈竦鴃舌折腰卉服來庭毳裘入貢葢以深明豹畧精究龍韜波伏西天草偃南土者然侵軼我華夏無乃不可乎將為我皇帝有所負于彼邦邊臣有所負于彼國慮彼直我曲獲罪于天是陳木夾申懷用貯榮報及披迴示已見事根止于囚繫使人放歸彼國始乎小怨終此深仇吞噬我朗寧䖍劉我交趾取我越巂犯我益州若報東門何乃再四夫物居中者尊也處外者卑也是以衆星拱之北辰百谷趨之東海天地尚不能違而況于人乎我國家居天之心宅地之腹四方八表莫不輻輳亦猶北辰之與東海也誠知土地山河歸于有徳雖云有徳亦須相時茍無其時安可妄動明公博識多聞豈不見仲尼乎仲尼之聖踰堯舜顔子之賢過祖龍沛令萬萬無立錐之地者葢無其時也適使仲尼生于秦時乘胡亥之亂用顔回閔損為宰相子路冉有領將軍子貢宰我充行人子夏言偃典書檄雖六合鼎沸可朞月而定也當此之時劉項只可比肩韓彭不過一將耳聖人雖有帝天下之徳而無帝天下之時終不妄動及子路使門人為臣以為欺天乎及自歎曰鳯鳥不至河不出圖吾已矣夫止于負手曳杖逍遙倚門告終而已王莽不識天時苻堅不知厯數妄恃强富争先乾坤莽以百萬鋭師來襲後漢光武以五千之衆破于昆陽苻以六十萬精兵摧于東晉謝𤣥以八千之卒敗于夀春豈不為欺天罔地所致者也國富兵彊何足恃也周主杖箠于岐山漢祖脱褐于泗水我髙祖起自隴州葢明公只知其一未知其二見其形未見其理也今與明公陳之望審參焉昔周王承公劉之徳遇殷紂之暴刳剔孕婦塗炭生靈剖賢人之心斮朝涉之脛三分天下而二歸周文王率諸侯而朝之至于武王觀兵孟津八百諸侯不期而會尚曰彼有人焉未可圖也退歸修徳觀乎聖人去就豈容易者哉及微子去比干剖箕子奴民不聊生皇天厭之國人棄之武王方援旗誓衆一舉而滅紂者葢天奪殷而與周也我皇方旰食宵衣肩堯踵舜父事三老兄友百僚推赤心于比干腹中懸白日于微子頭上諸侯合徳百姓歡心縱天下有人聖如周王家有姬旦戸生吕望者乎漢祖承帝堯之徳遇秦王無道併吞六國恃宇宙一家焚燒詩書坑滅賢哲築長城于紫塞造阿房于皇州鬼母哭蛇人臣指鹿民不聊生皇天厭之國人棄之是以陳勝一呼天下響應漢祖西入五星都聚者葢天奪秦而與漢也我皇帝方崇詩書任賢哲卑宫室䘏黔黎野無歌鳯之人朝有問牛之傑縱天下有人英如漢祖家有韓信戸生張良者乎我髙祖承元元之徳遇隋煬帝荒淫徭役不常徵斂無度竭生民財産為巡幸之資糧虎噬羣賢猱烝庻母浮沈遼海既鑿汴河今年東征明年西伐民不聊生皇天厭之國人棄之是以我髙祖應天順地奄有四海者葢天奪隋而與唐也我皇帝方淡薄聲色杜絶巡遊夢卜宰輔倚注藩屏思成垂拱惡習干戈皇天方贊國人可歡縱天下有人雄如唐祖家有敬徳户生𤣥齡者乎而況越巂新州牂牁故地不在周封之内非居禹跡之先曩日邊將邀勛妄圖吞併得之如手加駢拇失之若頷去贅瘤九牛之落一毛六馬之亡半毳何足喻哉僕雖自絳紗素躭黄石既探師律因識兵機奉詔填壓三巴撫安百姓思敦禮樂恥用干戈每傷虞芮之争田永念姬周之讓路既不獲巳即須訓戎且蜀地濶數千里郡列五十城戸口至多士卒之衆可以揮汗成雨吐氣成雲葢縁從前元戎皆是儒者有昩見幾而作但守升平之元規雖分常憂不教民戰是以彼國得以深入無備故也僕示之以三令教之以八陣鼔聲而進鉦動而退甘與之共苦與之均義等塤篪情由瓜葛閲禮樂而敦詩書務耕桑而聚穀帛使家藏甲胄户貯干戈賞罰並行公私共貫既識三畧便可七擒不唯喝倒不周亦可擘開太華況彼國自長慶以來騒擾益部殺人之父孤人之母掠人之妻鰥人之室焚人之廬舍使人暴露剪人之桑麻使人寒凍蜀人怨恨痛入骨髓僕乘其衆怒之勢示其報怨之門況抱雞搏狸不由人教乳犬敵虎自是物情既仗宗廟之威靈兼統華夏之精鋭若乘流縱棹下坂推車豈勞力哉僕官是宰衡位當侯伯披堅執鋭雖則未嘗濟河焚舟平生所貯彼國將帥之强弱邦國之盈虚坐可酌量何煩詢誘且六合之外舟車不及聖人不言彼國在聖人不言之鄉舟車不及之地縱主上英哲人臣俊乂亦猶燭龍銜耀只可照于一方春雷振聲不能過于百里天與不取談何容易夫天有五賊見之者昌彼國縱曉六韜未閑五賊而欲泥封函谷水灌晉陽何其謬哉五賊者夏桀張羅殷湯祝網是以仁而賊不仁也殷紂剖生人周文葬枯骨是以徳而賊不徳也齊國厚徵薄貸魯國厚貸薄徵是以恩而賊不恩也項羽殺義帝漢髙祖舉哀是以義而賊不義也陳後主驕奢隋文帝恭儉是以道而賊不道也能行五賊兼曉六韜方可奪人山河傾人社稷我朝未有五失而彼國徒自陸梁以此推之興亡可鑒何勞逺離廷戸始識安危久習韜鈐方明勝負而妄要姑息不務通和迴示荒唐一何乖戾罔念孔顏之知禮翻效莽堅之履車交趾喪亡可知人事新都失律足見天時若望降尊便希抗禮但百谷不趨東海衆星不拱北辰則不可議也茍未如是則不可改圖昔管仲入周不受上卿之禮蘇武出使無虧中國之儀事有前規固難更易況小不事大春秋所誅若彼直我曲恐招天殃既彼傲我謙何患神怒見已訓齊士卒調集糗糧或玉露垂槐金風動栁建鼓數里命車指南涉巂弔民渡瀘㑹獵繼齊魯之夾谷紹秦趙之澠池便是行人豈遺往䇿皇帝聖㫖以其前緘奏聞不復多談恐乖忠告謹牒此答木夾書元是胡曾與路巖相公鎮蜀日修之非為髙駢相公也何光逺悞述鬼傳書西川髙相公駢版築羅城日遣諸指揮分擘地界開掘古塚取塼甃城獨滄州守禦指揮使姜知古卓旗占得西南肖波塊若困反蜀人呼老弱為波墳塚為塊其塊即趙畚相公墳也年代深逺碑文磨滅走脚損斂肖字存焉姜君號令將健俟曉開之是夜二更以來忽聞墓上清嘯數聲良久有人云㝠司趙相公遣使送書姜君驚曰既是聖者送書容某穿靴祇候鬼使白冥司小鬼何敢當之姜君呼其僕使鋪排淨席焚香于庭匍匐拜迎䖍心祝曰某負何罪聖者降臨鬼使出曰雖顯晦有殊奉命差遣欲陳之懇容面咨祈乃持出一緘展開數幅並無文字鬼使曰但挑燈半滅燈影看之其可見也既而細視之果見文翰流美徵古述今詞㫖感傷書盡復有一篇比諷悽惻因召鬼使就席談吐分明自云姓何名滅沒黄衣束帶骨瘦喙長與姜君對飲數巡對食數味乃贈錢十千退讓再三曰人間重錢隂府何用希皂錢一帖即當取奉姜君遣僕立買皂錢仍修迴狀鬼使倐然不見酒食並已存焉姜君至曉持神鬼使所送到書并詩面聞元戎遽絶諸軍開劚古塚仍差大將往彼祭焉其詩與慕容垂所吟事皆相似王蜀韋文靖莊嘗與著作房鶚悲歎此詩歴觀史書未之聞也其書曰㝠司趙畚謹以幽昩致書于守禦指揮端公閤下竊以趙氏之寃搏膺入夢良夫之枉披髮叫天是以有寃必仇無道則見此則流于柱史載自前文如畚者一介遊魂九泉罔象徳不勝享禱不勝人無廟貌于世間遂堙沉于泉壤自蒙天譴使掌冥司雖叨正直之官未達聰明之理未嘗以威服衆唯知以禮依人頃在本朝叨為上相不無濫徳敢有害盈今者伏審渤海髙公令君毁壊墳闕況畚靖居幽府天賜佳城平生無戰伐之仇邂逅起誅夷之骨得不撫銘旌而憤志託觚染以申懷伏希端公俛念無依迥垂有鑒特于方雉免此一坏儻全馬鬛之封敢忘龍頭之庇謹吟絶句後幅上聞不勝望徳之至謹白其詩曰我昔勝君昔君今勝我今人生一世事何用苦相侵躭釋道裴休相公性慕禪林往往掛衲所生兒女多名師女僧兒潛令嬖妾承事禪師留其聖種當時士族無不惡之李徳裕相公惟好𤣥門往往冠褐修彭祖房中之術求茅君㸃化之功沙汰緇徒超昇術士俱無所就身死朱崖議者以裴李二公累代台鉉不守諸儒之行各迷二教之宗翻成㸃汚空門妖婬𤣥教自莊老之後彭黄已來未有因少女以長生皆向隂丹而損夀葢夫心之難制氣之難防者也至若心中造業身外求真梁武帝為寺家奴豈禳困死長孫后號觀音婢唐長孫皇后小字難懴産亡所謂善不可不修財不可不捨惑之與黨者非也近以二公之行識者笑焉所以時人譏晉公曰趙氏女皆尼氏女師翁兒即晉公兒却教術士難推筭胎月分張與阿誰灌鐵汁唐末徐州亷使時太師溥忽于公暇設寢夢到太山府君殿前見領出一人云是許州押衙秦宗權府君曰君為國賊否宗權對曰職小力微慮違天道府君怒曰運數使爾夫何違􅁘遂令壯士掠之宗權終云不為遂呼一將曰取鐵汁來俄頃之間鐵汁既至有鬼數輩頓宗權坐分其髪以鐵汁自頂門灌其聲爆烈烟焰勃然灌訖又問之宗權大叫反字者三府君遂捨之令時公相見府君謂溥曰異日宗權作亂卿可助之時與秦一齊拜謝之颯然寤焉溥于是以其夢有異書于密室楹上後數年許州差秦宗權持禮而至溥因覩所申入境狀中姓名與往年夢中冥契因厚迎待之從容之間屏去左右問之各符所夢遂引宗權密室楹上觀看所記之事因歃血為盟後值上蔡為叛蔡是許支部許帥委都押衙劉火頭失其名差大將一人往彼安慰火頭遂差宗權充使元戎以為不可火頭堅有保持宗權既蒙差行喜遂其志矯其軍制遂滅蔡人却起狂謀自據城壘時太師發兵三萬徑入蔡州兼助糧儲以副所夢旌旗一舉尅復許田其後宗權兵勢轉强與梁太祖日有相持數年之間方克擒得太祖遣通引官冦彥卿與語宗權對曰英雄不兩立彼勝則我敗故君子禍至不懼福至不喜公何喜􅁘太祖甚嘉其言因檻送上都津致頗厚時太師既而失利却歸徐州然常有好道之心接士畧無厭倦忽一日有一道士姓郭名端直詣公衙自云亥州而至溥延迎數日問有何求端曰知君道情故來相謁溥曰本非好道别有愚誠葢縁所據藩方封圻不逺養兵數萬闕少贍軍欲求利術一門以俾帑藏端曰道在其中矣遂索一鐵杵杵至可重三十餘斤端于衣帶間取藥一粟許碾碎以酒調之塗于兩頭以大火百斤已來鍛之自午至申水沃取出其杵一頭則藥色如麗水一頭則如雪色中心五寸以來宛然是鐵溥甚忻訝敬為上仙端遂請朱砂一斤泥爐以大片丹藥令太師自看火候約一月而成端才請命一賓相伴出市飲酒溥乃差藥院官元邵南齎其酒價朝夕隨之端飲百杯邵南只飲十盞至夜酩酊所在宿焉端謂邵南曰我與爾開其酒戸匪唯飲酒兼益夀齡邵南因餌其丹逐日陪奉飲至五十餘盞所患疝氣亦痊端至一月歸衙開爐取藥結成一塊香氣馥人透掌光明如紅玉之狀謂溥曰此藥所須在意號曰太一丹砂知太師不住人間遂來救䕶溥但悲感而已却未知救䕶因由忽見一猧兒遂敲藥少許揾餅與食其犬須臾之間化為烈焰一團騰空而去是嵗梁太祖舉四鎮之衆攻伐其城堅守數旬闕乏糧料端與時公一宅骨肉二百餘口俱上燕子樓元邵南亦欲隨之端不令上樓謂邵南曰子未合登此須臾樓中火發紅焱亘天色若紅蜺段段飛去及至火歇灰燼亦無軍民異之謂之火解也燕子樓至今存焉元邵南雖不得上樓顏色轉少行如奔馬終日醺酣邵南至梁帝之時猶在翰林院祇應其時年九十後亦不知存亡前定録梁太祖篡位之初宰臣薛貽矩自御史大夫百日拜相性懷忠正臨事端明公事之間每加寛憫太祖忽因入閤怪之曰卿為天子郎官何得不親政事薛奏曰臣少年之時曾任封丘主簿在官之日嘗與僧悟因相知每日公暇之時便到其院此僧預知臣至先在院門等臣以是殷勤直至三年考滿替人將至或一日其僧不出院内臣怒僧世情以言責問僧云今日實不知簿公訪及有闕迎門臣因問每日又何知之僧曰每日微僧齋後略睡便有神人報云薛相公來微僧倉忙驚起披掛出院迎待果是簿公臨門今日神人不來相報有悞迎接非是世情臣遂請僧結壇特念乞其警戒其僧果見神人相報云薛主簿為曲斷公事一件取錢五緡却不得宰相也若正其公事却還其錢即可牽復不然者無計矣僧因報臣警戒遂省其匪尋便還錢改正公事其神人果又報僧曰薛公名字在宰相夾中臣自後不敢欺公每事審細大凡公事豈宜造次而行太祖眷知通州悦其所奏賜金百兩尋加吏部尚書後扈從太祖鑾輿自洛還汴熒惑三犯上相得疾而薨是知悟因名亦前定矣鑒誡録巻二
