body:
  text: 鑒誡録巻一後蜀何光逺撰瑞應䜟孟蜀髙祖頃者未臨西川守北京蜀人競以擊拂之間妙絶者於呼頭入為孟入或云此毬子從太原將來又有工人孟徳預起宫闈上淩霄漢雖般輸之妙無以加焉雖徳與得之字體不同音亦為祥矣又王蜀後主元舅徐太師延瓊于錦水應聖橋西創置大第狀若宫室横亘數坊是時内外皇親宣下悉令暖宅後主亦親幸宴樂移時忽于徐公堂中命筆大書孟字徐雖不測其義尋以御札謝恩至咸康後主降唐孟祖自北京臨蜀莊宗憂大軍之後制禦事多立宣鑄印離京奔騎赴鎮既而旌幢届蜀以統軍興聖太子未歸族令將校改換宫闈孟祖乃權于徐公之第安下覩紅綃所籠姓字怪問前蜀臣寮對曰此王後主御札髙祖歎曰疎狂天子亦預知與吾交代乎是知必有先應者也誅利口同光初莊宗滅梁將行大禮蜀遣翰林學士歐陽彬將禮入洛顧太尉逺為之副焉莊宗復遣李客省嚴銜厥命以通好嚴本辨士也既而届蜀亦稱臣焉然于朝對之間舉措輕易及置一笏記廣敘興亡詞㫖鏗鏘驚駭聞聽蜀之文武卿咸伏其雄洎歸中朝上䇿取蜀及平蜀之後莊宗命孟祖制臨嚴又于明宗天成得位之初復來臨䕶孟祖加之禮分賜從容乃言曰我聞利口之覆邦家辨言之亂刑政故少正夘言偽而辨孔子誅之子今巧言如簧弗矜細行有大罪者五自知之乎子知初與王朝折箭為誓及其降也復又誅之遂使天道惡盈二國俱滅其罪一也其次平蜀之際先入禁闈取内藏之金珠選宫庭之嬪婇其罪二也頃者詐諭三川減釋兩税及其得地倍更加徵其罪三也而又誑惑朝廷妄陳利害説三川之形勢剏二鎮之節旄閬綿控扼我咽喉覬覦我土宇其罪四也今又來為監䕶坐握兵權儭我藩維承我爵位人神豈恕天意恁容爾之再來機亦繆矣其罪五也言訖遂令武士把下階簷嚴亦倉皇失其節操乃叩頭曰嚴之五罪一死宜然願乞殘骨為洛中之鬼髙祖不聽命劍斬之是時天下咸聞皆稱妙􅄸其李嚴于王蜀所置笏記曰臣嚴等言伏自朱温肆逆運屬昭宗三年痛别于西秦一旦迫遷于東洛誅殘南北焚􅋹宫闈雖列藩悉是其唐臣無一處不從其偽命由是大唐中興皇帝念髙祖太宗之業倐爾隳張憤朱温崔𦙍之徒同謀篡弑遂乃神機迴發心鼎獨然竭滄溟而誓戮鯨鯢芟林莽而决除虎兕十年對壘萬陣交鋒慮久困于生靈乃選挑其死士才過汶水縛王彦章于馬前時號王鐵槍旋及夷門斬朱友貞于樓上梁末主名劍霜未匣槍雪猶輝段凝領八萬雄師倒戈伏死趙巖知一人應運引領待誅遂使賊將寒心謀夫拱手取乾坤只勞于八日救塗炭遂定于四維備振皇威咸遵帝力今則秦庭貢表兩浙稱臣淮南陳附拜之儀囘紇備朝天之禮才安宇宙便息干戈未順梟凶方議除剪豈謂蜀國皇帝柔逺懷邇居安慮危喜帝祚于中興羣妖息滅特遣蘇張之士將追唐蜀之歡吾皇迴感于蜀皇國禮逺酧于厚禮臣等叨承元造獲奉皇華載馳得面于彤庭戰汗實深于跼地臣等無任感恩荷聖踴躍屏營之至知機對長興初孟蜀髙祖與東川董太尉璋初為睦鄰之知後結姻親之國兵車不間玉帛交馳縱有是非未至深信因請節度副使趙僕射季良持禮至彼探其機宜董與趙有寄託之知懷魏都之舊及節副詐陳衷素董公盡罄血誠既而西歸備得其事髙祖問曰公度董公作略畢竟如何節副對曰董公為人豺狼之聲狗鼠之行卒徵暴斂好殺惡生其志剛强不量人事用兵好勝不達天時余聞豺狼常有野心狗鼠亦無定度卒徵暴斂事急則逃好殺惡生物極則返故曰强梁者不得其死好勝者必遇其敵此之是也而且朝令夕改坐喜立憤兵有鬭心將無戰意方令以小謀大弊民惠奸有窺四海之心終作西川之患而又宫中取事語下失機料其訓練兵師完葺珹壘招我將健挫我使臣必行雷電之機不顧山河之誓髙祖聞所敷陳深納其言至長興三年四月二十八日果興狂孽直犯漢州是時髙祖親統全師合戰于踪橋之野董璋大敗我將軍趙廷隱擒其將元璝董光演等八十餘員奪甲馬五百餘疋斬首一萬獲其九城梓綿龍劍普果閬蓬渠是也梓帥與其子光嗣柏膺而奔欲堅故壘為將王暉斬獻首級遂定方隅明宗遣供奉官李僕射馳騎入以賜髙祖詔曰朕知卿近與逆賊董璋小間交兵已勑軍前俾其掎角髙祖復請記室李昊修其章奏備陳本末事聞上聽宣示百僚中外咸知莫不驚駭其奏狀曰伏以故東川節度使董璋與臣為鄰從初不睦常厚誣于表疏每深間于朝廷欲竊兵權來并土宇及審聖聽不惑物論難從臣合此時奮激驍雄誅殛奸宄尋屬陛下翠華外駐黄屋未安捨亦何傷剋之不武用是益勞宵旰因議寢停雖隱忍以累年且參商而終日其後故臣安重誨時承君寵恣弄國權窺劍外之有萌示寰中之無畏料聖君之意必推亡以固存其如倖臣之言恐怒甲而是與董璋愛以暫合和而不同雖玉帛交馳豈心貌之相𩔖誠知藴蓄且務包容儻敢飛颺必當掃殄其董璋至今年四月二十八日暴興兵甲五月一日驟入漢州臣其日先差昭武軍節度兵馬留後兼左廂步軍都指揮使趙廷隱總領三萬人騎發次新都臣自統領衙内親軍二萬人騎繼之俱列營于彌牟鎮比至三日詰旦結其大陣俟勦元兇其董璋至午時敢領妖徒來當鋒鋭臣則親驅戈甲趙廷隱手奮鼓旗一擊而魚潰鳥離四合而豕分蛇斷斬首一萬餘級執俘八千餘人生擒賊中都指揮使元璝衙内副都指揮使董光演及以下指揮使都頭八十餘員奪下甲馬五百餘疋收獲衣甲器械十萬餘事其餘逆漏之徒尋令搜捉并盡其董璋只與親男衙内都指揮使董光嗣并從騎二人罄馬而奔棄甲而遁撫隻輪而掩泣視亂轍以感哀烏江之死所不遙赤壁之慙顔更厚臣幸以疾雷之勢破其急電之機臣便統領大軍壓背追襲其董璋至四日巳時走入東川至午時有前陵州刺史王暉知窠巢之已傾騐城池之不守梟斬董璋父子首級相次迎獻軍門徑進師徒收下城壘平定一方之衆止于四日之間莫不遐伏皇威戡除鄰穢臣方以自違君命未達臣誠捷音雖審其風馳奏疏未遑于羽揷豈謂皇帝陛下才聆動静遞軫憂勞遄降使臣特頒明詔諭董璋之奸罪勉㣲臣以削平仍勅軍前俾施掎角並得暗合方略顯應神機更無唇齒之虞永荷股肱之寄所以舉子勾龍逢獻賀捷詩曰唇齒論交嵗月長豈期率意忽顛狂元戎統領三軍戰巨孽奔衝一陣亡莫訝潼江剛入冦都縁錦浦合興王武功蓋世光前後堪向青編萬古揚九轉騐㑹昌末武宗皇帝酷求長生之道訪九轉之丹茅山道士杜元陽製藥既成白日輕舉弟子馬全真得殘藥詣京表進上因餌之徧體生瘡髭髮俱脱十日而崩此唐實録隱而不書又梁朝方山道人自號龎九經身長七尺不知年幾百歲每于石室修氣經年絶食太祖往往遣使賜乳頭香及茶藥而已忽一日詔入内殿求延生之術龎奏曰夫神仙之法亦因積學而成是須息萬慮于人間棲一身于巖穴與天地合徳與鳥獸同羣斷其喜怒悲哀去其滋味淫慾然後存神養氣辟穀休糧欲究還丹審窮爻象故曰内真外應其丹自來而又功滿三千方得羽化今陛下身居九有心役萬幾孽毒三軍誅殘百姓怨滿天下恩虧一家豈同軒居清静自化鼎湖上昇者哉太祖怒曰知卿是龎勛本身朕欲問卿行止何得妄議難易非斥朕乎龎度太祖言深慮遭其誅責復奏曰臣有靈丹可延九五之數儻放臣棲隱即敢進之上復笑曰朕不希白日上昇只希更得三五十年在位是朕願也龎乃于肘後解一青瓢子取金丹二粒進曰望陛下清素守真百日方可餌之不然者疢惡耳上既深信龎得歸山後帝久患石淋忽宣至服藥後眉髪立墮頭背生癰及至彌留為穎王所殺乃知九轉悞非一君其次諸侯遇之死者無數非丹有損而人不知或曰武宗因坼寺患癩而崩實庸説也金統事僖宗乾符中靖陵雨血三日丹鳯樓前赤蟻黄蟻聚鬭七日掃盡復生己亥嵗天㵼血流大地俱赤是夜長虹貫斗星奔西南明年黄冦犯闕翠華奔幸之兆也辛丑年黄巢在京尚讓為相改乾符之號為金統元年見在百司並令仍舊忽一日有人潛書七言四韻帖在都堂南門譏諷頗深偽相大怒應堂門子及省院官並令剜眼倒懸以令三省又奏請宣下諸軍大隊内收得文官令吟詩者宜令就營屏除如只是識字者宜令將内役使是時京城内外殺戮三千餘人百司驚惶皆至逃竄其七言詩四韻詩曰自從大駕去奔西貴落深坑賤出泥邑號盡封元諒母郡君變作士和妻扶犂黒手翻持笏食肉朱唇却喫􅐽唯有一般平不得南山依舊與天齊走車駕昭宗之代岐王茂貞本姓宋昭宗賜姓號曰西府太子華州韓建邠州王行瑜等始為亂階焚􅅡宫闈動搖四海斬刈百官是時駕幸三峰抛離九廟諸侯悉罷職貢各養强兵天復初車駕走幸石門絶糧數日左街沙門懷寶進蕎麵燒餅奉宣賜紫宫人楊舞頭失其名進裛淚手帕子奉宣加楚國夫人二年岐州天雨蕎麥人收食之悉遭疫癘是嵗雷劈牛馬頻擾宫城拔出街西古槐揚下殿東鴟吻故昭宗御製詩曰祇解劈牛兼劈𣗳不能誅惡復誅兇三年梁太祖將迎大駕之前岐山二菩薩身中自然有箭老􅆅廟土人移步神馬夜嘶後昭宗有困守岐陽迫遷東洛之兆也初拾遺張道古貢五危二亂表黜居于蜀後聞駕走西岐又遷東洛皆契五危之事悉歸二亂之源因吟一章上蜀王八丈詩曰封章才達冕旒前黜詔俄離玉座端二亂豈由明主用五危終被佞臣彈西巡鳯府非為固東播鑾輿卒未安諫疏至今如可在誰能更與讀書看鑒誡録巻一
