body:
  text: 鑒誡録巻八後蜀何光逺撰衣錦歸段相國文昌本廣都縣人父以油柞為業云云因官而沒生而有致長亦多才物業蕩空文章迥振洎跨衛行倦鄉里笑之歴三十年間衣錦還蜀蜀人有詩贈曰昔日騎驢學忍饑今朝忽著錦衣歸等閒畫虎驅紅勒可謂登龍入紫微冨貴不由組綬解文章生得羽毛飛廣都再去應惆悵猶有江邊舊釣磯又羅使君向本廬州人不事田産而慕大名以至困窮竟無退倦常投福泉寺僧房寄足每旦隨僧一食學業而已歴二十年間持節歸郡洎入境專逰福泉寺駐旌㦸信宿書其壁曰二十年前此布衣鹿鳴西上虎符歸行時賓従過前事到處杉松長舊圍野老共遮官路拜沙鷗遙避隼旟飛春風一宿琉璃殿惟有泉聲惬素機非告勒陳太師敬瑄任西川日有愛姬徐氏甚有美色即徐令長女也失名其父自郫城宰欲求彭牧以紅絹數寸書二十八字遣其妻私示其女議者以徐習進而乖父子之道其詩曰深宫富貴事風流莫忘生身老骨頭因共太師歡笑處為吾方便覔彭州又合州石境宰馬産珪者本遂州長江縣富庶之子也晩親文筆未識風騷謬學滑稽語多譏誚因聘女自為内相醉酧新郎催粧之詩詩意風艶之甚親族聞者莫不笑之其詩曰莫飛篇翰苦相煎欵欵容人帖翠鈿不是到来梳洗晩却憂玉體未禁憐唐末盧拾遺議與鄭中舎延休作贅三年不歸陕下其兄誥以詩讓之詩意甚乖昆仲之禮盧議呈其太山中舎并女遣之誥寄弟詩曰三年作贅在京城著箇緋衫倚勢行夜夜貪憐紅粉女朝朝渾忘白頭兄親情别後饑寒死僕使歸来氣宇生河上可能容此事筭来天道不分眀改橋名雍使君陶典陽安日簡州地名送客至橋離情未已揖讓既乆欲更前車客將曰此處呼為情盡橋向来送迎至此禮畢陶下馬命筆題其橋楹改為折栁自兹送别咸吟是詩簡郡風情不同義路矣詩曰従来只有情難盡何事名為情盡橋自此改名為折栁従他離恨一條條作者同劉禹錫尚書有望洞庭之句雍使君陶有詠君山之詩其如作者之才往往暗合劉望洞庭詩曰湖光秋月兩相和潭面無風鏡未磨遙望洞庭山水翠白銀盤􅂻一青螺雍詠君山詩曰煙波不動影沈沈碧色全無翠色深疑是山仙梳洗處一螺青黛鏡中心李山甫有詠貧女天下稱奇秦侍郎韜玉繼之意轉殊絶李原詩曰平生不識繡衣裳閒把金簮益自傷鏡􅂻只行諳素貌人間多是信紅粧當年未嫁還憂老終日求媒即道狂兩意定知無處說暗垂珠淚滴蠶筐秦侍郎繼曰蓬門未識綺羅香擬託良媒益自傷誰愛風流髙格調共憐時世儉梳粧敢將十指誇纎巧不把雙眉鬭畫長最恨年年壓金線為他人作嫁衣裳李君又有石頭故事韋莊有詠南國英雄較量其才意同語合李君詩曰南朝天子愛風流盡守江山不到頭總是戰争收拾得却因歌舞破除休堯將道徳終無敵秦把金湯可自由試問繁華何處在雨苔煙草石城秋韋莊詩曰南朝三十六英雄想像興亡盡此中有國有家皆是夢為龍為虎亦成空殘花廢宅悲江令落日青山弔謝公止竟霸圖何物在石鱗埋沒卧秋風王右丞維有題雲母障子胡令能有題綉障子雖異代殊名而才調相繼右丞詩曰君家雲母障持向野庭開自有山泉入非闗彩畫来胡生詩曰日暮堂前花藥驕争拈小筆上牀描綉成按向春園􅂻引得黄鸚下栁條又許渾有過台州李郎中舊居盧延讓有哭李郢端公終越州従事至今吟者無不愴然許君詩曰政成身沒共興衰鄉路兵戈旅櫬迴城上暮雲凝鼓角海邊春草閉池臺經年未塟佳人散昨日因齋故吏来南北相逢皆掩泣白蘋洲暖一花開盧公詩曰車門半掩槐花宅每過猶聞哭臨聲北固暴亡兼在路東京孰作未歸塋漸窮老僕慵㸔馬著慘佳人暗理笙詩侶酒徒銷散盡一埸春夢越州城又李相公紳有傷農之叶鄭徵君雲􅅱繼之名公不敢優劣李公詩曰鋤禾日當午汗滴禾下土豈知盤中飡粒粒皆辛苦鄭君詩曰一粒紅黍飯㡬痛牛領血珊瑚𣗳下人銜杯吐不歇賈忤㫖漢賈􅁩昔在長沙為鵩鳥賦史書稱之為屈矣賈島字浪仙忤㫖授長江主簿卑則至卑名流海内矣島初赴洛陽日常輕於先輩以八百舉子所業悉不如已自是往往獨語傍若無人或閙市髙吟或長衢嘯傲忽一日於驢上吟得鳥宿池中𣗳僧敲月下門初欲著推字或欲著敲字煉之未定遂於驢上作推字手勢又作敲字手勢不覺行半坊觀者訝之島似不見時韓吏部愈權京尹意氣清嚴威振紫陌經第三對呵唱島但手勢未已俄為官者推下驢擁至尹前島方覺悟顧問欲責之島具對偶吟得一聨安一字未定神遊不覺致衝大官非敢取尤希垂至覽韓立馬良乆思之謂島曰作敲字佳矣遂與島並語笑同入府署共論詩道數日不厭因與島為布衣之交故愈有贈二十八字島因此名出寰海詩曰孟郊死葬北邙山日月風雲頓覺閒天恐文章聲斷絶再生賈島向人間賈又吟病蟬之句以刺公卿公卿惡之與禮闈議之奏島與平曽等風狂撓擾貢院是時逐出闗外號為十惡議者以浪仙自認病蟬是無摶風之分詩曰病蟬飛不得向我掌中行折翼猶能薄酸吟尚極清露葉疑在腹塵㸃候侵晴黄雀并烏鳥俱懐害爾情島後為僧改名無本又哀投蜀僧悟達國師知𤣥院中或去法乾寺返初服潛於鐘樓安下日與師覺輝無可上人姚殿中合私相唱和慮卿相所問專俟宣宗微行欲見帝希特恩非時及第及宣和微行值𤣥不在上聆鐘樓上有秀才吟咏之聲遂登樓於島案上取吟次詩欲看島不識帝攘臂睨帝遂於帝手奪之曰郎君何㑹耶帝慚赧下樓𤣥公㝷亦歸院島撫膺追悔欲投鐘樓帝惜其才急詔釋罪謂島曰方知卿薄命矣遂御札墨制除島為遂州長江主簿帝意令島繼長沙故事勅曰比者禮部奏卿風狂遂且令闗外將息今既却攜卷軸潛至京城遇朕微行聞卿髙咏覩其至業可謂屈人是用顯我特恩賜爾墨制宜従短簿别候殊科可守劍南道遂州長江縣主簿仍便齎勅乘驛赴官所管藩候放上聞奏大中八年九月七日制下島因授此官永難貢籍初之任届東川府主馮八座三十里出盛禮以迎之既至館舎見待甚厚大具肴饌宴設故島獻感恩詩曰匏革奏終非獨樂軍城未曉啟重門何時却入三台貴此日空知八座尊羅綺舞間收雨㸃􅆛貅閫外卷雲根逐遷屬吏隨賓列撥棹扁舟不忘恩後有一少年除長江簿猶豫不赴張蠙先輩為詩刺之曰少年為理但公清鴻漸行中是去程莫恨長江為短簿可能勝得賈先生島自長江遷普州司倉方干自鏡湖寄詩曰亂山重復壘何路訪先生豈料多才者空垂不第名閒曹猶得醉薄俸亦深耕莫問吟詩苦年年芳草平島至老無子因啖牛肉得疾終於傳署後崔騎評事倅岳陽日為詩悼之岳陽普州地名今因創墓在岳陽山上山下有岳陽池詩曰倚恃才難繼昂藏貌不恭騎驢衝大尹奪巻悞宣宗馳譽超先輩居官下我儂司倉舊曺署一見一心忪又聖子李克恭有詩曰一一𤣥微縹緲成盡吟方便爽神情宣宗謫去為閒事韓愈知来已振名海底也應捜得静月輪常被玩教傾如何未隔四十載不過論量向此生屈名儒唐末宰臣張文尉中書舎人封舜卿等奏前有名儒屈者十有五人請賜孤魂及第方干秀才是其數矣每見人設三拜而已謂禮數有三識者呼為方三拜亦曰方十四郎干為人唇缺連應十餘舉有司議於才則才矣不可與缺唇人科名中外所聞為國家鮮士矣干潛知所論遂歸鏡湖後十數年遇醫補得年已老矣遂舉不出鏡湖時人號曰補唇先生弟子李頻等皆中殊科干可謂屈人矣故有鏡湖西島閒居詩曰寒山壓境心此處是家林梁燕欺春醉岩猿學夜吟雲従平地起月向白波沈猶自聞鐘覺栖身可在深又詩世人如不容吾自縦天慵落葉慿風掃秋粳任水舂花朝連郭霧雪夜隔湖鐘身在能無事頭宜白此峯又感懐云至業不得力至今猶苦吟吟成五字句使破一生心世路屈聲滿山溪寃氣深前賢多晩達莫怕鬢霜侵李頻上第後干寄詩曰弟子已攀桂先生猶卧雲此恨之深矣干為詩鍊句字字無失如寄友人云鶴盤逺勢投孤嶼蟬曳殘聲過别枝齊梁已来未有此句詠擊甌則體絶物理詩人罷唱詩曰白器敲来曲調成腕頭匀細自輕清隨風搖曳有餘韻測水淺深多汛聲春漏丁當相次發寒蟬計食一時鳴従今已得佳聲出衆樂無由更得名干與杭州于郎中為硯席之知因求舉棹逺逰羣所杭牧疑干為詩無猝才因夜醼與飛字韻請賦一章干半酣書成合筵驚駭于贈二百千充潤五十字于可謂愛士矣詩曰間世星郎夜醼時丁丁寒漏滴聲微琵琶弦促千般調鸚鵡杯深四散飛徧倚玉容歌白雪髙燒紅蠟照朱衣人間有此榮華事争遣漁翁戀釣磯又李先輩宣古于澧陽陪杜悰司空宅宴席上賦得桃字詩曰紅燈初上月輪髙照見堂前萬朶桃觱篥調清銀字管琵琶聲亮紫檀槽能歌姹女顔如玉解飲蕭郎眼似刀争禁夜深抛耍令舞来按去使人勞又杜工鎮荆渚日夜宴出歌姬送酒李羣玉校書於燭下飛筆獻杜詩曰裙拖六幅瀟湘水髻聳巫山一段雲態貌只應天上有歌聲豈合世間聞胸前瑞雪燈斜照眼底桃花酒半醺不是相如憐賦客肯教容易見文君又盧延讓客夜宴栁司馬陟宅得更字詩曰蘭堂夜宴在秦城座下荷衣倍覺榮金鼎烹炮過百味銅壺刻漏轉三更紅粧妓出催添燭白雪歌遲待煖生猶自何郎歡不足桂花未識玉峯傾章先輩孝標于李使君筵贈歌人劉小小得娘字當時名公無不賞歎詩曰諸侯帳下慣新粧皆怯劉家薄媚娘寳髻巧梳金翡翠羅裙宜着綉鴛鴦輕輕舞汗初沾袖細細歌聲欲繞梁何事不歸巫峡去故来人世斷人腸已上五公之詩雖綺靡香艶而含蓄情思皆不及施肩吾夜宴曲云蘭釭如晝買不眠玉爐夜起沈香煙青城一行十二仙欲笑不笑桃花然碧窻㺯嬌梳洗晩户外不知銀漢轉被郎嗔罰屠蘇盞酒入四肢紅玉軟錢唐秀羅𨼆秀才微睨於人體物風刺初赴舉之日于鍾陵筵上與娼雲英同席一紀後下第又經鍾陵復與雲英相見雲英撫掌曰羅秀才猶未脫白矣𨼆雖内恥尋亦嘲之鍾陵醉别十餘春重見雲英掌上身我未成名君未嫁可能俱是不如人𨼆常獻巻於鄭相公畋鄭女妙于篇什每讀𨼆詩至張華漫出如丹語不及劉侯一紙書未嘗不於父前三復似慕其才相國或一日因𨼆到宅遂留従客命女下簾窺之女見𨼆為人闕永不復吟𨼆詩矣𨼆又與顧雲先輩謁淮南髙相公駢顧為人風雅時渤海公辟留𨼆遂辭歸錢塘髙與賓幕小酌賮𨼆於海風亭是時盛暑有青蠅入座渤海公命扇驅之顧謔𨼆曰青蠅被扇扇平離座𨼆立酧之曰白澤􅇜釘釘去在門議者以才調相譏兩俱全美𨼆度髙公欲繼淮王求仙所為妖亂潛題后土廟刺之連夕挂帆而返巫者告公公既悔且怒急棹追之已出境矣詩曰四海干戈尚未寧又於汾水達儀形九天𤣥女猶無聖后土夫人豈有靈一帶野雲侵鬢緑兩條宫栁入睂青常郎年少知何事端坐唯看太白經髙後失致因吕用之等幻惑為師畢師鐸所害𨼆自錢唐著妖亂誌以非之故有題延和閣云延和髙閣勢凌雲卿語猶疑太乙聞燒盡降香無一事開門迎得畢將軍昔僖宗在蜀時𨼆吟詩數首以刺諸侯及鑾輅還京為朝貴所嫉竟不成名後錢尚父鏐為詩酒之侣繼遇中原喪亂無復所聞駕在蜀詩曰白丁攘臂犯長安翠輦蒼皇路屈盤丹鳯有情雲外逺玉龍無跡渡頭寒静思貴族謀身易危惜文皇創業難不將不侯何處是釣魚船上淚闌干又寄詠漫天嶺云南去休誇蜀道難此中危峻已多端到頭不㑹蒼蒼意争得淋零曲度漫駕還京詩曰馬嵬楊栁尚依依又見鑾輿幸蜀歸泉下阿蠻應有語這迴休更說楊妃𨼆以諷刺頗深連年不第舉子劉贊贈之詩曰人皆言子屈我獨謂君非眀主既難謁青山何不歸年虚侵雪鬢塵枉汚麻衣自古逃名者至今名豈微𨼆覩之因起式微之思遂自歸五湖詩曰江東日暖花又開江東行客思悠哉髙陽酒徒半凋落終南山色空崔嵬聖代也知無棄物侯門未必用非才一船眀月一竿竹家住五湖歸去来走山魈施肩吾先輩為詩竒嚴冠於當時著千韻山居才情富贍如荷翻紫盖搖波面蒲瑩青刀揷水湄又煙粘薜茘龍􅂡軟雨打芭蕉鳯翅垂又贈邊將詩曰輕生奉國不為難苦戰身多舊箭瘢土匣鏁龍鱗甲冷金鈴襯鶻羽毛寒皂貂擁出花當背白馬騎来月在鞍猶恐犬戎臨紫塞栁營時把陣圖㸔又上禮部侍郎陳情云九重城􅂻無親識八百人中獨姓施弱羽飛時攢箭險蹇驢行處薄氷危晴天欲照盆難覆貧女如花鏡不知却向従来受恩地再求青律變寒枝又贈友人下第閒居云花眼綻紅斟酒㸔藥心抽緑帶煙鋤如是之𩔖皆輕秀之極及第後逰南楚楚多山魈為患俗號聖者是時亦来館穀攪擾施君施君當風一詠於是屏跡詩曰山魈本是伍家奴何事今為聖者呼小鬼不須乖去就國家才子號肩吾鑒誡録巻八
