body:
  text: 鑒誡録卷七後蜀何光逺撰倣十在有唐十在著自簡編為古人之美談顯君臣之强盛林員外屖亦著前蜀十在行自閭閻眀其禍亂之胎示以君臣之醜雖為謗訕深鑒是非慮墜斯文輒編於此其文曰咸康元年蜀主臨軒龍顔不恱羣臣失色罔知所安時有特進檢校太傳顧正珣越班奏曰臣聞主憂臣辱主辱臣死今聖慮懷憂臣等請罪帝曰北有後唐霸盛南有蠻蛋强良朕雖旰食宵衣納隍軫慮此不能興師弔伐彼不能臣子來往恐社稷不安為子孫之患是以憂爾正珣奏曰只如興土木於禁中選驍雄於手下回持釜鉞出鎮藩籬飾宫殿於遐方金鑾輿而逺幸為釁之兆為禍之元有承王休在摧挫英雄吹揚佞媚全無斟酌謬處腹心斷性命於戲玩之間戮仇讐於樞機之下有功勞而皆棄非賄賂而不行有少光嗣在受先皇之付囑為大國之棟梁既不輸忠又不能退恣一門之奢侈任數子之驕矜徒為叨餮之人實非社稷之器有王宗弼在迥徹煙霄殊非謇諤興亂本逞章呈之妙說奸謀事頰舌之能立致傾亡尚居左右有韓昭在常加慘毒每恣貪殘焚爇軍營要覔私第不道喧騰於衆口非違信任於愚懷有歐陽見在酷毒害民加利聚貨叨為郡守實負天恩瘡痍已遍於陽安蒙蔽由慿於內密有由魯儔在為君王之元舅受保傅之尊官但務奢華不思輔弼第宅迥同於上苑珠珍未滿於貪心有徐延瓊在出為留守入掌樞機無諤諤以佐君但唯唯而徇㫖有景潤澄在搜求女色恱暢宸襟常叨不次之恩每冒無厭之寵敷對唯誇於辨博匡時不諳於經綸素非忠賢實為忝竊有嚴凝月在唱亡國之音衒趨時之俊每為巫覡以玩聖朝致君為桀紂之年昧主乏唐虞之化有臣在陛下任以如此何憂社稷不安帝聞所奏大恱龍顔於是賜顧正珣絹五百匹進加右金吾衛將軍開府儀同三司檢校太尉仍令所司編入史記亡國音王後主咸康年晝作鬼神夜為狼虎潛入諸宫內驚動嬪妃老小奔走往往致卒或任逰玉壘書王一於倡樓或醉幸青城溺內家於漢口數塗脂粉頻作戎裝又內臣嚴凝月等競唱後庭花思越人及搜求名公艷麗絶句編為栁枝詞君臣同座悉去朝衣以晝連宵弦管喉舌相應酒酣則嬪御執巵后妃堪亂令手相招醉眼相盼以至履舄交錯狼籍杯盤是時淫風大行遂亡其國後庭花者亡陳之曲故杜牧舍人宿秦淮有詩曰煙籠寒水月籠沙夜泊秦淮依酒家商女不知亡國恨隔江猶唱後庭花又胡曽詠史詩曰鄰國機權未可涯如何後主恣驕奢不知即入宫前井猶自聽歌玉𣗳花思越人者亡吳之曲故胡曽詠史詩曰吳王恃霸棄雄才貪向姑蘇醉渌醅不覺錢塘江上月一宵西送越兵來栁枝者亡隋之曲煬帝將幸江都開汴河種栁至今號曰隋堤有是曲也胡曽詠史詩曰萬里長江一旦開岸邊楊栁幾年栽錦帆未落干戈起惆悵龍舟更不回又韓舍人詠栁詩曰梁苑隋堤事已空萬條猶舞舊春風那堪更想千年後誰見楊花入漢宫又賀祕監知章羅給事𨼆詠栁輕巧風艷無以加焉賀君詩曰碧玉粧成一𣗳髙萬條垂下緑絲縧不知細葉誰裁出二月春風似剪刀又詩曰裊裊和煙映玉樓半埀橋上半垂流今年漸見枝條密惱亂春風卒未休又李博士涉有題錦浦垂栁曰錦池江口栁垂橋風引蟬聲送寂寥不必如絲千萬𣗳只禁離恨兩三條雪廢主天成初眀宗臨朝宣亡蜀舊宰臣王鍇張格庾傳素許寂御史中丞牛希濟等各賜一韻試蜀主降臣唐詩限五十六字成王鍇等皆諷蜀主僭號荒淫失國獨牛希濟得川字所賦詩意但述數盡不謗君親眀宗覽詩曰如牛希濟才思敏捷不傷兩國迥存忠孝者罕矣當日有雍州亞事之拜至今京洛無不稱之詩曰滿城文物欲朝天不覺鄰師犯塞煙唐主再懸新日月蜀王還却舊山川非干將相扶持拙自是吾君數盡年古往今來亦如此幾曽歡笑幾潸然陪臣諫諸侯之臣曰陪臣王蜀咸康元後主將幸天水羣臣列號懇諫上意不從前秦州節度掌書記蒲禹卿獨上一表云秦王之鑾駕不回煬帝之龍舟不返至今傳為忠臣及後主降唐至雍州受死巴蜀宰臣王鍇等乞後主體骨歸葬蜀山其表云生為萬乘之君死在匹夫之手蒲君隨例赴洛亦在長安痛後主邅誅朝廷失信於馹門大慟仍書五十六字而歸雍守捕之蒲已還蜀其詩曰我王銜璧逺稱臣何事全家併殺身漢舍子嬰名尚在魏封劉禪事猶新非干大國渾無識多是中原未有人獨向長安儘惆悵力微何路報君親直諌後主幸秦州表云臣某言頓首死罪臣聞堯有敢諫之鼓舜有誹謗之木湯有司過之士周有戒慎之銘蓋古者眀君克全帝道欲知己罪要納讜言將引咎而責躬庶理人而修德陛下自承祧秉籙正位當天愛聞恱耳之忠言每許犯顔而直諫且先皇帝許昌振跡閬苑興師歷艱辛於草昧之時受危險於虎爭之際胼胝戈甲寢寐風霜申武力而取中原立戰功而平多壘亡軀致命事立勤王方得成家至於開國今日鴻塞霸盛大業推崇地及雍岐界連荆楚信通吳越感定蠻陬郡府頗多關河甚廣人物秀麗土産繁華當四海輻凑之秋成萬代龍興之業陛下生當冨貴坐得乾坤但好歡娛不思機變臣欲望陛下以名教而自節以禮樂而自防修道德之規受師傅之訓知社稷之不易想稼穡之最難惜髙祖之基模似太宗之臨御賢賢易色孜孜為心無稽之言勿聽弗詢之謀勿用聽五音而受諫以三鏡而照懷少止宿於諸處林庭多歷覽於王前書史别修上德用卜逺圖莫遣色荒無令酒惑常親政事勿恣閒逰臣竊聞陛下欲出都城看於邊壘且天雄地逺路惡難行險棧攲雲危峯插漢稍雨則吹摧閣道微泥則阻滑山程豈可鳴鸞惟堪叱馭又復秦州敵境咫尺塞邑荒涼人雜畨戎地多疫瘴别無風華異境不可選勝尋幽隴水聲清邊笳韻咽營中只帶甲之士城上宿枕戈之人看烽火於孤峯朝朝疑慮覩旌旗於絶嶺日日隄防是多山足雲之鄉即易動難安之境麥積巖無可瞻戀米谷峽何足聞知縱過嗟山須通怨水秦穆圉馬之地隗囂僭位之邦其次一人出行百司參從千羣霧擁萬衆星馳當路州縣凋殘所在館馹隘小止宿尚猶不易供須因是極難縱若宫中指揮自破屬省錢物未免因伊擾踐觸處陵遲以此細論不合輕重其類蒼龍出海雲行雨施豈合浪靜風恬必見傷苗損物所以鑾輿須正天步難移况頻年大駕只到山南猶不下關進登兵士此時直至天水未審制置如何當初打破梁原城池俘掠義寧户口截腕者非一斬首者贍多匪惟生彼人心而亦損兹聖德今去洛京不逺復聞大駕重來彼則預有計謀此則便須征討况鳯州久為仇敵必貯奸謀竊慮妄指妖詞致生釁隙又陛下與唐國方申歡好信幣交馳但慮聞道聖駕親行别懷疑妄其或專差使命請陛下境土㑹盟未審聖躬去與不去若去則須似秦趙爭强彼此難屈若不去則便同魯衛不睦戰伐兹興酌彼未萌料其先見願陛下思忖臣伏聞自古帝王省方巡狩弔民伐罪展義觀風然後便歸九重别安萬姓陛下纍曽逰歷未聞一件教條止於踐涉山川驅馳人馬閬苑則舟船幾溺青城則嬪婇將沈自取驚憂為何切事及還京輦並不說於軍民迫鬱衆情莫彰帝德憶昔先皇帝在日未省無故巡逰陛下纂承已來率意頻離宫闕此時依前整蹕又擬逺别宸居昔秦皇之鑾駕不回煬帝之龍舟不返陛下聖逾秦帝眀勝隋皇且無北築之虞焉有東逰之弊陛下寬仁大度廣孝深慈知稼穡之艱難識古今之成敗自防得失不縱襟懷豈忍致却宗祧亡言道德使蒸民以何託令慈母以何辜若不慮於危亡實空乖於仁孝况玉京金闕寶殿珠樓內苑上林瑶池瓊國香風滿檻瑞露盈盤鈞天之樂奏九韶回雪之舞呈八佾簇神仙於紫禁耀珠翠於皇宫如論萬乘之君便是三清之境人間勝致天下所無時或追逰足觀奇趣何必傾於逺塞看彼荒山不惜匪躬有何裨益方今中原有人大事未了但當國生靈受弊盜賊橫行縱邊庭無烽火之虞而內地有腹心之患陛下千年膺運一國稱尊文德武功經天緯地孝逾於舜仁甚於湯百行皆全萬機不撓聰眀博達識度變通勝負規模獨懷殷鑒方居天寶正是少年既承社稷之基復抱山河之險何不逺聽邇察居安慮危闢四門以求賢總萬機而行事咸修一德端坐九重使惠威並行賞罰必當平分雨露遍療瘡痍庶表裡寬奢保子孫昌盛布臨人之惠化蓋救物之𤣥功選揀雄師思量大計振彼鴟張之勢壯兹虎視之威秣馬訓兵豐糧利器彼若稍有微釁此則直下平吞正取時機大行王道自然百靈垂祐四海歸仁衆心成城天下治理今則蜀都强盛諸國不如賢士滿朝聖人當極臣願百姓樂於正觀萬乘君於大宗採藥石之言聽芻蕘之說愛惜社稷醫療軍民同武王諤諤而昌鄙紂主唯唯而滅無飾非拒諫之事有面折庭諍之人固我春朝保我皇化陛下莫見居人稠疊謂言京輦繁華蓋是外郡陵殘住止不得所以競來臻凑貴且偷安今諸州虐理最多百姓失業欲盡荒田不少盜賊成羣伏乞陛下稍布腹心即當聞見蜀國從來創業多乏永謀或得不及於兩朝或祚不延於七代劉禪俄降於鄧艾李勢遽歸於桓溫皆謂不取直言不恤政事不行王道不念生民以致國亡人心何保山河之隘不足可慿陛下至聖至眀如堯似舜豈後主而相匹豈子仁而比倫有寬慈至孝之名有逺見長謀之䇿不信娼媚不耽荒淫出入而所在防微動靜而無非經久必致萬年之業終為四海之君願陛下且駐鑾輿莫離京國候中原無事八表來王天下人心咸歸我主若羣流赴海衆蟻慕羶有道自彰無思不服非唯要看天水直可便至長安是微臣之至懇舉國之深念也臣聞昔者天子有諍臣七人雖無道不失其天下是以輒傾丹邸懇諫聖眀不藉官榮不謀名譽情非訕上理切愛君雖無折檻之能但有觸鱗之罪不避誅殛輒扣天庭臣死如萬類之中去一螻蟻陛下或全無忖度頻向邊陲遺聖母以憂心令庶寮以懷慮全迷得失自取疲勞倘有不虞悔將何益臣願陛下稍開諫路微納臣言勿違聖后之情且允國人之望俯存大計莫去邊陲干犯冕旒無任憂惕冒死待罪激切屏營之至謹奉表直諫以聞臣某誠惶誠恐頓首頓首死罪死罪謹言四公㑹長慶中元微之劉夢得韋楚客同㑹白樂天之居論南朝興廢之事樂天曰古者言之不足故嗟歎之嗟歎之不足則詠歌之今羣公畢集不可徒然請各賦金陵懷古一篇韻則任意擇用時夢得方有郎署元公已在翰林劉騁其俊才略無遜讓滿斟一巨杯遂為首唱飲訖不勞思忖一筆而成白公覽詩曰四人探驪吾子先獲其珠所餘鱗甲何用三公於是罷唱但取劉詩吟咏竟日沈醉而散劉詩曰王濬樓船下益州金陵王氣黯然收千尋鐵鎖沈江底一片降幡出石頭荒苑至今生茂草古城依舊枕寒流而今四海歸王化兩岸蕭蕭蘆荻秋此篇元在詩本事中叙說甚詳今何光逺重取論叙更加改易非也長安慈恩寺浮圖起開元至太和之嵗舉子前名登逰題紀者衆矣文宗朝元稹白居易劉禹錫唱和千百首傳於京師誦者稱美凡所至寺觀臺閣林亭或歌或詠之處向來名公詩板潛自撤之蓋有愧於數公之詩也㑹元白因傳香於慈恩寺塔下忽視章先輩八元所留詩白命僧抹去埃塵二公移時吟咏盡日不厭悉全除去諸家之詩惟留章公一首而已樂天曰不謂嚴維出此弟子由是二公竟不為之詩流自慈恩息筆矣章公詩曰十層炎瓦在虛空四十門開面面風却怪鳥啼平地上自驚人語半天中回梯暗踏如穿洞絶頂初攀似出籠落日鳯城佳氣合滿城春𣗳雨濛濛贄舊詩李相公吉甫其先失其官諱初修進之日獻卷示維揚護軍宋甄大夫甄寡於博識不哀王孫連上數啓都不動念李於館舍栖旅之甚去住無依遂吟一絶句贄之宋以微茫禮遺而已李後上第生吉甫吉甫繼歷臺省自信州刺史節判青州待士稍薄舉子吳武陵詣府投擲相國似無見重之意吳不存忌諱遂書相國先君舊謁宋大夫陳情一章密獻相國相國大慙追悔俟暝召吳執手惆悵厚賂於吳請為寢默詩曰十處投人九處違家鄉萬里又空歸嚴霜昨夜侵人骨誰念尊堂未授衣釣巨鼇㑹昌四年李相公伸節鎮淮南日所為尊貴薄於布衣若非皇族卿相囑致無有面者張祜與崔涯同寄府下前後廉問嚮祜詩名悉蒙禮重獨李到鎮不得見焉祜遂修刺謁之銜題詩釣鼇客將俟便呈之相國遂令延入怒其狂誕欲以言下挫之及見祜不候從容及問曰秀才既解釣鼇以何物為竿祜對曰用長虹為竿又問曰以何物為鈎曰以初月為鈎又問曰以何物為餌曰用唐朝李相公為餌相公良久思之曰用豫為餌釣亦不難致遂命酒對斟言笑竟日憐祜觸物善對遂為詩酒之知議者以祜矯諭異端相國恱其取媚故史不稱之惡其僞也鑒誡録卷七
