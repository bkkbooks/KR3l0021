body:
  text: 鑒誡録卷三後蜀何光逺撰語忌誡劉仁遇嘗與梁太祖葉戲一日或過充盈仁遇行伍出身語多方拙謂太祖曰得則洪溝太祖應之曰縱得未可時太祖方據四鎮仁遇復在偏裨雖是親家復王太嶽太祖竟為語忌後太祖一居南面仁遇久在西班纍乞一藩終不俞允既而年邁寢疾在牀新婦屢有奏聞太祖猶徵語忌至于悲泣哀告方除兖州未及赴官疾殛而卒是知凡事為誡寧不書紳而記之乎餌長虹孟蜀侯侍中本溝坂人也幼而家貧長為軍外子弟年方十三嵗困寐于屋簷下是日炎蒸天將大雨有長虹自河飲水黃河也俄而貫于童兒之口惟其母見不敢驚之欲窺其變異侯母可謂賢矣良久虹自天沒于童兒之口不復出矣母俟其睡覺問其子曰夢中有所覩否對曰適夢入河飲水飽足而歸母聞其言知子必貴後數月有一行腳蜀僧詣門求齊侯母竭力供養僧臨去謂侯母曰女弟子當九九後福合得兒子氣力侯母呼其子出請僧相之僧視之曰此兒龍也即非真龍乃蛟螭之輩也但離鄉别井直近江海客官方有顯榮又曰此子孽毒當食血肉為生靈之患常敬信三寶即得令終言訖而去侯後果自行伍出身至于將領同光三年從興聖太子魏王繼岌收蜀及平蜀之後不隨太子而還無何與陜府節度使康延孝率河中同華等軍為叛堅守廣漢是時孟髙祖悉發守禦指揮使韓德遇本州都指揮使李仁罕等破之活擒康延孝表送駕前侯亦面縛麾下髙祖赦罪至領親軍軍令威嚴頗有聲譽及髙祖南面自眉州刺史節度夔州復自江寧遷于黔府一州二鎮皆近大江果至崇官酷信三寶遍于禪院開轉藏經然于理務之間孽毒之甚廣興第宅竟獲善終是知蜀僧所言其不謬矣落韻貶戶部李侍郎如實者本梁朝清直之士也均王名友貞在東宫時李以筆硯佐之及均王即位不得居密司李常深恨之及見帝黜剝賢良見用奸詐每伺便欲折檻諫之或一日李在帝際帝問李曰卿知天子見誰補之李奏曰人臣所補帝曰朕地據三川位尊九有若非天意所補人臣又何補焉李曰太祖出身行伍歷職卑微萬戰千征九生十死方得節居四鎮位處一人陛下生在深宫長居富貴披承餘䕃嗣守萬方豈知王業艱難人臣共致固須理不忘亂居安思危臨泉履氷責躬省過況吳門强盛蜀國繁華太原有殺兄之仇秦庭懷負國之怨得失頃刻豈是天補者哉若是天補為君只合自天降下喫天人之食受天人之衣方今血使三軍膿食萬姓自喜天補豈不非耶陛下如此發言為覆餗之禍耳上曰憨老漢不足與語耳李即日有鄭州之拜再宿貶汝州副使至汝州置一卧車子常于車子中安酒一瓢琴一張書數䇿遣小童十餘人載而入謁長街朗詠觀者笑焉李恨朝廷久無牽復之命裁落韻詩以譏之後入蜀遇孟髙祖之知及開霸初拜户部侍郎而卒落韻詩曰路傍傷羸牛羸牛身已老兩眼不能開四蹄行欲倒牛曾少壯時歲歲耕田早耕却春秋田駕車長安道今日領頭穿無人飼水草喘也不能喘問也沒人問又曰炎蒸不可度執爾生凉風在物成非器于人還有功殷勤九夏內寂寞三秋中想君應有語棄我如秋扇蜀上醫昔秦醫在晉知膏肓之病難醫楚療于申辨血氣之容是詐其次劉根召鬼不為無神文摯封人顯彰有術虞少卿洮蜀上上醫也長興初佐蜀董太尉璋久患渴疾遣押衙李彥求醫孟蜀祖遣虞卿而往虞卿既至董公曰璋之所患經百名醫而無微瘥者何也虞卿對曰君之疾非唯渴漿而似渴士得其多士不勞藥石而自愈矣董公大悅時董公有南面之志虞卿故以此言譏之又曰洮聞天有六氣降為六淫淫生六疾害于六腑六氣者隂陽風雨晦明也是以六淫隨焉六疾者寒熱入腹感心也是以六腑隨焉故心為離宫腎為水臟晦明勞役百疾生焉大凡視聽至煩皆有所損心煩則亂事煩則變機煩則失兵煩則反五音煩而損耳五色煩而損目滋味煩而生疾男女煩而減夀古者君子莫不誡之君今日有萬思時有萬機樂淫于外女淫于內渴之難療其由此乎虞卿之在東蜀也如處蒲團節食假寂董公疾既平復于是厚禮歸之乃知蜀上之醫有知稽古者也妖惑衆明宗朝有術士楊廷郎者善使鬼神觸物變化是時見者稱為竒人及就誅夷一無靈異王蜀有楊廷郎叔楊勛者自號僕射能于空中請自然還丹其丹立降又能召九天𤣥女后土夫人悉入簾帷經宿而去及折其一足西市斬之藥亦無徴術亦無驗尸骸臭穢觀者笑焉彭州僧號曰醋頭長髭垂髮以功德燈像衲為三衣狀若佯狂妖言惑衆蜀之聾俗莫不皈依明德中故田特進敬金典九隴日辟賈侍御鶚倅職彭門及權郡事賈本青社人也為理公清性憎佞媚郡縣僚屬視若氷霜是時醋頭不敢入境後郡人思共瞻禮詣賈判狀請歸賈亦多才判其狀曰出家長頭未除煩惱為衣掛像豈敬慈尊面禪室以邪淫發妖言而惑衆妄裁厯數上侮朝廷謾述災殃下迷聾俗況今有漏未證無生將修功德以為名積聚私財而作賈但以正人惜事君子含宏未議剪除致兹猖熾所嗟鄙俚競信妖稱列狀詣衙欲希迎請須行嚴令以絶風情付司散帖所由如入界把捉申送候到决脊奏聞醋頭知之便越鄰境而去矣鑒誡録卷三
