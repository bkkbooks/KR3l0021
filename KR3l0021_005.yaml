body:
  text: 鑒誡録卷五後蜀何光逺撰徐后事左傳昭公二十六年叔向之母曰子靈之妻殺三大夫陳御叔楚襄老申公子靈是三大夫一君一子君靈公也一子徵舒而亡一國兩卿矣孔寧儀父可無懲乎吾聞之甚美必有甚惡此春秋為深誡矣前蜀徐公耕二女美而竒艷初太祖搜求閨色亦不知徐公有女焉徐寫其女真以惑太祖太祖遂納之各有子焉長曰翊聖太妃生彭王次曰順聖太后生後主後主性多狂率不守宗祧頻嵗省方政歸國母多行教令淫録重臣頃者姊妹以巡逰勝境為名恣風月煙花之性駕輜軿于緑野擁金翠于青山倍役生靈不資經費凡經過之所宴寢之宫悉有篇章刋于五石自秦漢以來妃后省巡未有富貴如兹之盛者也順聖皇太后題青城夫人觀云早與元妃慕至元同躋靈嶽訪真仙當時信有壺中境此日親來洞裏天儀仗影交寥廓外金絲聲揭翠微巔唯慚未致華胥理徒祝升平卜萬年翊聖皇太妃繼曰獲陪翠輦喜殊常同陟仙程豈厭長不羡乘鸞入煙霧此中便是五雲鄉順聖又題謁丈人觀先帝聖容云舜帝歸梧野躬來謁聖顔旋登三境路似陟九疑山日照堆嵐迥雲橫積翠間期修封禪禮方俟再躋攀翊聖繼曰共謁御容儀還同在禁闈笙簧宣寶殿綵仗耀金徽清淚沾羅袂紅霞拂繡衣九疑山水逺無路繼湘妃順聖又題元都觀云千尋緑嶂交流後登晀因知衆嶽低瀑布迸舂青石碎輪菌橫剪翠峰齊步粘苔蘚龍橋滑目閉煙嵐鳥徑迷莫道穹天無路到此山便是碧雲梯翊聖和曰登尋丹壑到元都接日紅霞照座隅即向周回巖上看似聞曾進畫圖無順聖又題金華宫云再到金華頂元都訪道回雲披分景象黛斂顯樓臺雨滌前山淨嵐吹去路開翠屏夾流水何必羡蓬萊翊聖繼曰蒼煙紅霧撲人衣宿露沾苔石徑危風巧解吹松外岫蝶嬌頻採臉邊脂同尋僻境思攜手暗指遙山學畫眉好把身心清淨處角冠霞帔事希夷順聖又題丹景山至德寺云周回雲水遊丹景因與真妃眺上方晴日曉升金照耀寒泉夜落玉玎璫松梢月轉禽棲影柏徑風牽麝食香虔揲六銖冥禱祝準期祚厯保遐昌翊聖繼曰丹景山頭宿梵宫玉軒金輅駐遙空軍持無水注寒碧蘭若有花開晚紅武士盡排青嶂下內人皆在講筵中我家帝子專王業積善終期四海同順聖又題彭州陽平觀云尋真遊勝境巡禮到陽平水逺波瀾碧山髙氣象清殿嚴孫氏句碑暗系師名夜醮古壇月松風森磬聲翊聖繼曰雲浮翠輦屆陽平直似驂鸞至上清風起半崖聞虎嘯雨來當面見龍行晚尋水澗聽松韻夜上星壇看月明長恐前身居此境玉皇教向錦城生順聖又題漢州三學山夜看聖燈云虔禱遊靈境元妃夙志同玉香焚靜夜銀燭炫遼空泉漱雲根月鐘敲檜杪風印金漂聖迹飛石顯神功滿望天涯極平臨日腳窮猿來齋室上僧坐講筵中頓覺超三界渾疑證六通願成修偃化社稷保延洪翊聖繼曰聖燈千萬炬旋向碧空生細雨濕不暗好風吹更明磬敲金地響僧唱梵天聲若説無心法此光如有情順聖又題天回驛云周遊靈境散幽情千里江山暫得行所恨煙光看未足却驅金輦入龜城翊聖繼曰翠驛紅亭近玉京夢魂猶自在青城比來出看江山境盡被江山看出行議者以翰墨文章之能非婦人女子之事所以謝女無長城之志空振才名班姬有團扇之詞亦彰淫醜今徐氏逞乎妖志飾自幸臣假以風騷庇其遊佚取女史一時之美為遊人曠代之嗤唐朝興弔伐之師蜀國有荒淫之主三軍不戰束手而降良由子母盤遊君臣陵替之所致也于是亡一君後主名衍破一國殺九子彭王宗鼎推王宗輅褒王宗紀興王宗澤榮王宗獻忠王宗賢資王宗霸後主所生二子長曰承祧次曰承祀誅十人齊王宗弼宋光嗣王宗渥王宗勛歐陽冕景潤登李輅周王承休韓昭肅懷武殄滅萬家流移百辟其次六宫嬪御挫紅緑于征途十宅公王碎金珠于逆旅子靈之室何以比方故興聖太子隨軍王承旨失名有詠後主出降詩曰蜀朝昏主出降時銜璧牽羊倒繫旗二十萬軍齊拱手更無一個是男兒又蜀僧逺公有傷廢國詩曰樂極悲來數有涯歌聲才歇便興嗟牽羊廢主尋傾國指鹿姦臣盡喪家丹禁夜涼空鎖月後庭春老漫開花兩朝帝業都成夢陵樹蒼蒼噪暮鴉帝贈别王太祖自利閬兵以至益州為帝唐太師道襲閬苑人也美眉目足機智自童年親事太祖及太祖得蜀遂主樞衡勛業既髙恩寵彌厚是時太祖與秦庭李大王茂貞方結姻好遽因小間交兵遂選腹心以安梁漢唐公于是出鎮焉帝御大安樓親送及見唐公將别帝頗動容侍從宫娥無不揮淚太祖御製贈别以賜唐公御者以魚水之歡元出于此詩曰丱嵗便將為肘腋二紀何曾離一日更深猶髙立案前敷奏柔和不傷物今朝榮貴慰我心文旌引向重城出褒斜日地委勳賢從此生靈承秦恩容易格王蜀盧侍郎延讓吟詩多著尋常容易言語時輩稱之為髙格至如送周太保赴浙西云臂鷹健卒懸氊帽騎馬佳人著畫衫又寄友人云每過私第邀看鶴長著公裳送上驢此容易之甚矣然于數篇見境尤妙有松門寺云山寺取涼當夏夜共僧蹲坐石階前兩三條電欲為雨七八箇星猶在天衣汗稍停牀上扇茶香時潑澗中泉通宵聽論蓮華義不藉松窗半覺眠又苦吟云莫話詩中事詩中難更無吟安一箇字撚斷數莖鬚險覔天應悶狂搜海亦枯不同文賦易為著者之乎又贈僧云浮世浮華一段空偶拋煩惱到蓮宫髙僧解語牙無水老鶴能飛骨有風野色吟餘生竹外山隂坐久入池中禪師莫問求名苦滋味過于食蓼蟲盧曾獻太祖卷中有栗爆燒氊破貓跳觸鼎翻後太祖冬夜與潘樞密峭在內殿平章邊事旋令宫人于火爐中煨栗子俄有數栗爆出燒損繡褥子時太祖多疑常于爐中燒金鼎子命徐妃二姊妹親侍茶湯而已是夜宫貓相戲誤觸鼎翻太祖良久曰栗爆燒氊破貓跳觸鼎翻憶得盧延讓卷有此一聯乃知先輩裁詩信無虛境來日遂有六行之科自給事拜工部議者以傳説棲巖自應武丁之夢太公釣渭俄遇周文之知君子窮通實由命分如盧所吟容易之句發境于一人之前可謂道合矣髙尚士王蜀廣德杜先生光庭學海千潯詞林萬葉凡所著述與樂天齊肩僖宗朝與華山鄭徵君雲叟同應百篇兩戰不勝遂各挂羽服鄭則後唐三詔不起杜則王蜀九命不從可謂髙尚隱逸之士也鄭徵君為詩皆除淫靡迥絶囂塵如富貴曲云美人梳洗時滿頭間珠翠豈知兩片雲戴却數鄉稅又詠西施云素面已云妖更著花鈿飾臉橫一寸波浸破吳王國又七言傷時帆力劈開滄海浪馬蹄踏破亂山青浮名浮利過于酒醉得人心死不醒又題霍山泰尊師老鶴玄猿伴採芝有時長嘆獨移時翠娥紅粉嬋娟劒殺盡世人人不知又偶題似鶴如雲一個身不憂家國不憂貧擬將枕上日髙睡賣與世間榮貴人又思山詠因賣丹砂下白雲鹿裘惟惹九州塵不如將耳入山去萬是千非愁殺人又景福中作悶見戈鋋匝四溟恨無竒䇿救生靈如何飲酒得長醉直到太平時節醒又招友人遊春難把長繩繫日烏芳時偷取醉功夫任堆金璧摩星斗買得花枝不老無又山居云悶見有人尋移庵更入深谷花流澗水明月照松林醉勸頭陀酒間教孺子吟身同雲外鶴斷得世塵侵又詩冥心棲太室散髮浸流泉採柏時逢麝看雲忽見仙夏狂衝雨戲春醉帶花眠絶頂登雲望東都一點煙又詩不求朝野知卧看歲華移採藥歸侵夜聽松飯過時荷竿尋水釣背局上巖棊祭廟人來説中原正亂離杜先生為詩悉去浮遊迥為標凖區分理本實契真筌如山居百韻云丹竈河車休矻矻蚌胎龜息且綿綿馭景必能趨日域騎箕終擬躡星躔又返朴還淳皆至理遺形忘性盡真詮玄妙之門實為竒句又吟一言至十五言紀道德懷古今兩篇不惟體依風雅抑且言徵典謨名公之中可謂大製者也紀道德云道德清虛玄默生帝先為聖則聽之不聞搏之不得至德本無為人中多自惑在洗心而息慮亦知白而守黑百姓日用而不知上士勤行而必克既鼓鑄于乾坤品物信充仞乎東西南北三皇髙拱兮任以自然五帝垂衣兮修之不忒以心體之者為四海之主以身任之者為萬夫之特有皓齒青娥者為伐命之斧藴竒謀廣智者為盜國之賊曾未若軒后順風兮清靜自化曾未若臯陶邁種兮溫恭朝夕政可以越圓清方濁兮不始不終何止乎居九流五常兮理家理國豈不聞乎天地于道德也無以清寧豈不聞乎天地于道德也有踰繩墨語不云乎仲尼有言朝聞道夕死可矣所以乘萬古歷百王不敢離之于頃刻懷古今云古今感事傷心驚得喪歎浮沉風驅寒暑川流光隂始衒朱顔麗俄悲白髮侵嗟四豪之不返痛七貴以難尋夸父興懷于落照田文起怨于鳴琴鴈足淒涼兮傳恨緒鳯臺寂寞兮有遺音朔漠幽囚兮天長地久瀟湘隔别兮水濶煙深誰見絶勝韜賢餐芝餌术誰能含光遁身鍊石燒金君不見屈大夫紉蘭而發諫君不見賈太傅忌鵩而愁吟君不見四皓避秦峩峩戀商嶺君不見二疏辭漢飄飄歸故林胡為乎冒進貪名踐危途與傾轍胡為乎護權恃寵顧華飾與雕簪我所以思抗迹忘機用虛無為師範吾所以思去奢滅欲保道德為針規不能勞神效蘇子張生兮干時而縱辨不能勞神效楊朱墨翟兮揮涕以沾襟禪月吟唐有十僧詩選在諸集中唯禪月大師貫休所吟千首吳融侍郎敘之號曰巨嶽集多為貫休窮盡物情議者稱曰樂天為人教化主禪月次焉上人天復中自楚遊蜀有上王蜀太祖陳情詩云一瓶一鉢垂垂老萬水千山得得來太祖曰寡人尚築金臺以師名士廣修寶剎用接髙僧千山萬水之言何以當此于是恩錫甚厚上人遂居蜀焉如公子行云錦衣鮮華手擎鶻間行氣貌多輕忽稼穡艱難總不知五帝三皇是何物又曰自拳五色毬迸入他人宅却捉蒼頭奴玉鞭打一百又曰面白如削玉猖狂曲江曲馬上黃金鞍適來新賭得又詠古劒盆池秋水蓮花三四枝我來慷慨步遲遲不決浮雲斬邪佞直成龍去擬奚為又贈别離别如旨酒古今飲皆醉我恐長江水盡是兒女淚伊余非此輩送人空把臂他日再相逢清風動天地又富貴曲有金張族驕奢相續瓊厨玉堂雕牆繡轂美人如白牡丹花半日只舞得一曲樂不樂足不足爭教他愛山青水緑又曰繡林錦野春態相壓誰家年少馬蹄踏踏鬭雞走狗夜不歸一擲賭却如花妾唯云不顛不狂其名不彰悲夫初上人詩名未振時南楚才人競以詩送軒轅先生歸羅浮山計百餘家矣上人因吟一章羣公于是息筆玉房花洞接三清漫指羅浮是去程龍馬便攏笻竹杖山童常使茯苓精曾教莊子拋卑吏却喚軒皇作老兄再見先生又何日只應頻夢紫金城因詩辱前蜀許太尉宗憲鎮寧江日劉員外隱辭為節度掌書記許公發迹軍從所為諸務不思合理但務誅求劉數諌許不存賓客之禮對將吏咄責之劉求退職許又不從劉遂詠白鹽山灔澦堆刺之許聞而憤怨忽一日于江干飲酣仰視白鹽斜愧灔澦曰剛有破普忽反措大欲于此死遂令壯士拽劉離席囚縛于砂石上烈日曬之護軍賓幕將校懇救悉邅陵罵顧謂左右曰候吾飲散投入水中劉厲聲曰昔鸚鵡洲致溺禰處士今􅀈澦堆欲害劉隱辭某雖不及禰衡足下爭同黃祖豈有不存天理塗炭賢良但得留名死亦宜矣元戎聞之怒意漸解及同幕再諫良久捨之來日軍府彌縫請許召劉慚謝劉慮邅毒手託疾而歸議者以劉不擇主而爭因多言而失強捋虎鬚幾不脫虎口耳詠白鹽山詩曰占斷瞿唐一峽煙危峯迥出衆峯前都緣頑硬揎浮世著莫峥嶸倚半天有樹只知困鳥雀無雲不易駐神仙假饒屼屼髙千丈爭及平平數畝田詠灔澦堆云灔澦崔嵬百萬秋年年出沒幾時休未容寸土生纎草能向當途覆巨舟無事便騰千尺浪與人長作一堆愁都緣不似磻溪石難使漁翁下釣鈎武金山王蜀飛棹張侍中武其先諱雍本合州武金埧渡子武即雍之第三子也身長七尺顔狀紫黑往來豪俠無不畏之忽一日有一楚僧泝流遊蜀至渡頭出舟四顧謂同舟秀才曰此商姓山宅之地産東南貴人之所武方弱冠觸事通明聆其所云作而聽其言秀才曰穴在南山之腹僧曰若點此穴子孫當為民何以緣只屬商家金匱之上其穴在北山懷抱之內此則出貴子握兵權當受祿八旬奈何東有注地生女則當為倡西山低絶生男則一世便貧秀才曰如此則未為佳耳言訖乘舟而去武素本家貧父亡尚在淺土欲將父骨遷葬是山此乃武金埧巨室之地既無山價遂與兄弟偷葬于北山之中夜隂晦所如咫尺不辨靈柩至所葬之地自然數丈光明似有百千神兵同其安厝及其事畢寂爾空山武但深埋不敢置其墳冢本無標記人莫能知武以智略超人因荆渚效職却歸渝南渝州地名值王太祖收蜀之初武以鄉人應接及太祖得蜀纍遷渝牧及節制夔州三峽之中顯赫威名武每因統師下峽經過故林未嘗不屏去旌旗獨至葬所祭奠武後夀逾八十位極三公而卒其男則果貧乏有數女皆倡淫至今渝合之間傳為異事鑒誡録卷五
