  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0021_WYG_004-1a, image: WYG1035/WYG1035-0886a.png}
body:
  text: 鑒誡録卷四後蜀何光逺撰蜀門諷蔣貽恭本江淮人無媚世之諂有詠人之才全蜀士流莫不畏憚初見則言詞清楚不稱是非後來則唇吻張皇便分醜美干忤時相數遭流譴亦慷慨之士也自孟祖霸蜀搜訪遺材蔣亦遇時數蒙見用故言者無罪聞者自防録之數篇用知鼎味詠蠶詩曰辛勤得繭不盈筐燈下繅絲怨恨長著處不知來處苦但貪衣上繡鴛鴦又詠金剛揚眉斗目惡精神揑合將來恰似真剛被時流借拳勢不知身自是泥人詠傴背子曰出得門來背柱天同行難可與差肩若教倚面南窗下恰似箜篌不著弦又咏安仁宰搗蒜安仁縣令好誅求百姓脂膏滿面流半破磁缸成醋酒死牛腸肚作饅頭長生嵗取餐三頓坐饗朝來犯五甌半醉半醒齊出縣共傷塗炭不勝愁又五門街望有題曰我皇開國十餘年一輩超升炙手歡閒向五門樓下望衙官騎馬使衙官又謝郎中惠茶曰三斤緑茗賜貽恭一種須霑事不同料想肺懷無答處披毛戴角謝郎中詠蝦蟇詩曰坐卧兼行酒一般向人努力太無端欲知自己形骸小試就涔蹄照影看又貽恭住名山日陳情上府主髙太保知柔詩曰名山主簿實堪愁難咬他家大骨頭米納功南錢納府祇看江面水東流又蜀有鄭秀才雲從詠人祀聖君詩曰禍福從來豈自由任情淫祀也堪愁拜時何用頻偷眼未必泥人解㸃頭又行軍司馬向僕射瓚詠乘烟觀蔣鍊師蔣甚偉非婦人之狀怪得蹣跚不上升白雲踏綻紫雲崩龍腰鳯背猶嫌軟須問麻姑借大鵬又令狐祕書嶠匪唯善禮兼有卒才小小篇章亦多譏調因明慶節散後贈左右西街命服僧𤣥詩曰却羡僧門與道門元年今日紫衣新可憐州縣祈禳事盡向荷衣老却身又詠有年官健曰六十休論少壯時尉遲功業擬奚為髙聲念佛尋街者盡是勾停老健兒斥李珣賓貢李珣字德潤本蜀中土生波斯也少小苦心屢稱賓貢所吟詩句往往動人尹校書鶚者錦城烟月之士與李生常為善友遽因戲遂嘲之李生文章掃地而盡詩曰異域從來重武强李波斯强學文章假饒折得東堂桂深恐薰來也不香許墓靈左𫝊神降于莘有神人聲似接人惠王問諸內史曰是何故也對曰國之將興明神降之監其德也國之將亡神又降之觀其惡也故得神以興亦有以亡王蜀太祖與晉太師暉共為惡友悉生許下長而貧乏姓名無聞潛攻許昌縣民家事發太祖與晉俱遁武陽縣名古墓中是時潁川設無遮齊㑹至夜有數人呼墓曰潁川大㑹得無同行俄聞墓中應之曰蜀王在此不得相隨太祖與晉只聞其說不見其人則莫知蜀王誰是晉謂太祖曰八哥識逺謀大小子所不能及太祖欣然稱讓但懷內喜良久看㑹鬼回謂墓鬼曰知此有客今將飯三分來內二分獻王一分獻公墓中窸窣似有人承接飯二分各在太祖及晉前雖馨香不殊而太祖前品味頗異謂太祖曰只此是御飯矣二人潛笑既脫斯難因隨黃巢各為將領而已矣太祖自利閬舉兵收蜀勛業既大遂封蜀王晉亦終于太師是知武陽墓鬼通靈先知公王者也輕薄鑑前蜀馮大夫涓恃其學富所為輕薄然于清苦直諫比諷針規章奏悉于教化所著文章迥超羣品諸儒稱之為大手筆矣王太祖問擊掄之戲創自誰人大夫對曰丘八所置上為大笑又與相座王司空鍇等小酌巡故字令錯舉一字三呼兩物相似鍇令曰樂樂樂冷淘似餺飥涓曰已已巳驢糞似馬屎合座大咍㳙獨不笑但仰視長嘯而已凡所舉指譏誚多如此焉太祖為蜀王時方搆大業賦役增益轉運煩苛百姓困窮無敢言者因太祖生辰大夫獨獻一詩先紀王功後陳生衆太祖曰如卿忠讜寡人王業何憂遂賜黃金十斤以旌禮諫于是經役稍減矣議者以君臣道合黎庶泰來茍非明王何以采納生日歌略云百姓富軍食足百姓足軍民歡爭奈生靈飢且寒吾上有術應不難但令一斗徴一斛自然百姓富於官大夫又著檄龍文大蟲榜嶮竿歌無非比諷為世所稱文字繁多不復盡録嶮竿詩云山險驚摧車水嶮怕覆舟奈何平地不肯立沿上百尺髙竿頭我不知爾是人耶猿耶復猱耶教我見爾為爾長嘆嗟我聞孝子不許國我聞忠臣不憂家爾即輕命重黃金忠孝全虧徒爾誇常將嶮藝悅君目終日貪心媚君祿百尺髙竿百度沿一足參差一家哭嶮竿兒聽我語更有嶮竿嶮于爾解從上處失君恩落向天涯海邊去嶮竿兒爾須知嶮去欲往宜爾思上得欲下下不得我謂此輩嶮于嶮竿兒危亂黜昭宗之代張拾遺道古因貢五危二亂表敘興廢之事遂黜于蜀時王太祖辟為安撫判官張所為古僻不徇時情遂在道江縣名賣卜過日及太祖立極每思其賢遣使詔之屢徵不起復上章疏詞㫖是非帝遂誅之瘞于五墓之地鄭雲叟在華山之間吟詩哭曰曾陳章疏忤昭皇流落西南事可傷豈使諫臣終屈辱直疑天道惡忠良生前賣卜居三蜀死後馳名偏大唐誰是亂來修史者說君須到筆頭忙又西嶽僧貫休哭之曰清河逝水太匆匆東觀無人失至公天上君恩三載隔鏡中鸞影一時空妻亦尋卒塵生苦霧蒼忙外門掩諸孤寂寞中惆悵斯人又如此一聲羌笛滿江風據禪月詩集中此詩乃哭涪州張侍郎非張拾遺何光逺錯舉證也得夫地王蜀普慈公主出降秦州節度使李中令繼崇即秦王茂貞之猶子也初王太祖欲興師取天下而計未成因問大夫馮㳙㳙對曰臣聞興師者殘兵力虛府庫弊羣畜損弓甲衰桑農虧德義興詐僞故損國害人莫先于用兵也方今梁王朱全忠霸盛彊據兩京料其先取河東河東梁之敵國也勢不兩立儻一處為雄率天下之衆一舉西來縱葛亮重生五丁復出無以泥封大散石鎖劒門今秦庭實蜀之巨屏也去其屏窺見庭館焉莫若與秦王和親稍稍以麻布茗草給之不傷于大義濟之以小利蜀但訓兵秣馬因敵料彊足可以保大祿于山川固子孫于萬葉潛令公主探其機密窺彼室家俟便攻之一舉而獲可也帝曰甚善是時秦王遣使求親遂以普慈公主而許之于是成其姻好公主出降也小宫一帑之資以為粧奩服玩之說而導從華麗已逾千里秦王以隴右之地貧薄不産絲麻請西向稱臣希六萬衆春衣之賜太祖又用馮涓之計許之茶布請自備人力而迎秦王大喜率强丁及驢馬悉遣入蜀搬取其來也載青鹽紫草蜀得其厚利焉其去也載白布黃茶秦得粗貨矣每來駐泊周嵗而還閣道﨑嶇江溪壅滯人畜疲乏踣卧道塗是時秦大半不還遂止西來之役李駙馬繼崇久鎮天水與季父秦王常持兩端普慈公主密使閹人宋內侍光嗣絹書封事而達太子備述駙馬常驕矜每多沉湎或淫誅嬖妾或醉害賢良兵力方微民心思亂願歸侍省免死危邦事達宸聰六宫慟哭太祖遂詐以后薨遣使暫迎公主公主既至不復歸秦蜀遣大將軍許太師宗播將兵五萬與秦人戰于金沙地名秦人大敗于是獲其城邑遂迎駙馬及降無敵王劉知俊并戰俘郭守遷郭守存李彥德聶璝孫禮陳彥詞毛昌業邵雲等五十餘員大將馬三千餘匹兵士九千户六萬悉歸于蜀至同光三年秦賓後唐蜀遂亡焉蜀咸康元年是唐同光三年是充巨屏矣乃知馮君之口信不虛開矣鑒誡録卷四
