body:
  text: 鑒誡録巻九後蜀何光逺撰夢太白懿宗之代有處士張孜本京兆人躭酒如狂好詩成癖然於吟諷終昧風騷爾来二十餘年不成軸巻孜與李山甫友善常為山甫鄙之張乃圖寫李白真儀日夕䖍禱忽夢一人自天降下颯曳長裾是夕星月晃然當庭而坐與孜對酌論及歌詩孜問姓名自云李白孜因備得其要已而超然上昇孜後所吐篇章悉于敎化當時詩者稍稍善之有遇雪云長安大雪天鳥雀難相覔其中豪貴家搗椒泥四壁别處生紅爐同圍下羅羃暖手調金絲蘸甲斟瓊液醉唱玉塵飛困融香汗滴豈知饑寒人脚手生皴劈又庚子年遇赦云時清無大赦何以安天下直到赤睂来始尋黄紙寫草草蠲賦役忙忙㸃兵馬天子自蒙塵何曽濟孤寡又駕在蜀日孜著雜言數篇傷時頗切其一首兩聫云只愛輕與肥不憂貧與賤著牙賣朱紫斷錢賖舉選反駕還京之後相府遣人捕之孜乃易名姓越淮而去故李山甫嘗代孜歌歌其當時易字夢白云天使翰林生我前相去後来二百年英神絶氣歸𤣥天日月星辰空慼然我識翰林文不識翰林面上天知我憶其人使向人間夢中見瑞光閃爍天門開五雲著地長裾来華山秀作英雄骨黄河瀉作縦横才巍峩宛似神仙客一段風雷扶氣魄低頭語了却抬頭指㸃胸前稱李白夢中一面何殷勤髙吟大語喧青雲白言天府偶閒暇與我握手論髙文一論耳目清再論心骨驚豁如混沌初鑿破天地海岳何分眀利若劍㦸堅健如虯龍争神機聖法說畧盡造化與我新増靈不問塵埃人不語塵埃事罇前半日空歸雲掃筵起自言天上作先生許向人間為弟子夢破青霄春煙霞無去塵若誇郭璞五色筆江淹却是㝷常人削古風梁朝杜舎人荀鶴為詩愁苦悉於教化每於吟諷得其至理如贈僧云安禪不必須山水滅得心頭火自涼又利門名路兩何憑百嵗風前短焰燈只恐為僧心未了為僧心了總輸僧南宗睹之傳為心印杜在梁朝獻朱太祖時世行十首欲令太祖省徭役薄賦斂是時方當征伐不洽上意遂不見遇旅寄寺中敬相公翔謂杜曰希先輩稍稍古風即可進身不然者虚老矣杜遂課頌徳詩三十章以恱太祖議者以杜雖有玉堂之拜頓移教化之詞壯志清眀中道而廢時世行聊紀兩首頌徳詩不復録之夫因兵死守蓬茅麻紵裙衫鬢髪焦桑柘廢来猶納稅田園荒盡尚徴苗時挑野菜和根煑旋斫生柴𢃄葉燒任是深山更深處也應無計避征徭八十老翁住破村村中牢落不堪論因供寨木無桑柘為㸃鄉兵絶子孫還似平寧徴賦稅未曽州縣畧安存至今雞犬皆星散日落西山哭倚門分命録咸通中王建侍御吟詩寒碎竟不顯榮乾符末李洞秀才出意窮愁不登名第是知詩者陶人性情定乎窮通故韋荘補闕有長安感懐云大道不將鑪冶去有心重築太平基此則苞括生成末為台輔長興末何僕射瓚有蜀城書事云到頭須卜林泉𨼆自愧無能繼卧龍詩後十旬得疾而卒今録四公全什用眀將来王建侍郎寄賈島詩曰盡日吟詩坐忍饑萬人中覔似君稀僮眠冷榻朝猶卧驢放秋田夜不歸傍暖旋收新落葉覺寒重著舊生衣曲江池畔時時到為愛鸕鷀雨裡飛李洞秀才上崇賢曺郎中云閒坊宅枕穿宫水聽水分衾盖蜀僧藥杵聲中搗殘夢茶鐺影裡煑孤燈刑曺𣗳䕃千年井華岳樓開萬里氷詩句變風宫漸緊夜濤舂盡海邊藤韋補闕感懐曰長年方悟少年非人道新詩勝舊詩十畝野塘留客釣一軒春雨對僧棊花間醉任黄鸚語亭上吟従白鷺窺大道不將爐冶去有心重築太平基何僕射書事云果決生涯向洛中西投知已悞恩容雲遮劍閣三千里水隔瞿唐十二峯頻步文翁坊裡月閒㝷杜甫宅前松到頭須卜林泉𨼆自愧無能繼卧龍卓絶篇陳眀秀才題破吳王夫差廟汪遵先輩詠絶萬里長城程賀員外因詠君山得名時人呼為程君山劉象郎中因詠仙掌得名時人呼為劉仙掌以上名公稱為卓絶千百集中無以加此陳秀才題夫差廟云姑蘇臺上千年木刻作夫差廟裡神幡盖寂寥塵土滿不知簫鼓樂何人汪先輩詠史詩曰秦築長城比鐵牢蕃戎不敢過臨洮雖然萬里連雲際不及堯家三尺髙程員外詠君山曰曽逰方外見麻姑說道君山此本無元是崑崙山頂石海風飄落洞庭湖劉郎中詠仙掌曰萬古亭亭倚碧霄不成擎亦不成招何如掬取蓮池水洒向人間救旱苗改名達梁震先輩蜀川人也比名靄僖宗在蜀日方修舉業時劉象先輩隨駕在蜀震以所業贄於劉畧吟咏震詩曰據郎中少年才思清秀儻隨鄉賦成器非遙若不改名無因顯達向以縁靄字雨下従謁雨下謁人因甚得見此後請改為震震字雨下従辰辰者龍也龍遇水雨變化燒尾之事不亦宜乎震後果得上第名聞諸侯髙令公李昌召赴荆南以筆硯籌畫見託終身不就賓席慮因玷汚前眀至今南楚之間獨步而已鑒寃辱梁朝彭城王劉中令知俊制置同州日因築營墻掘得一物重八十餘斤狀若油囊召賓幕諸將問之或曰地囊或曰飛簾或曰金神七殺獨劉參謀失名曰此寃辱也古者囹圄之地即有此焉昔王充據守洛陽修河南府獄亦獲此物而某逺祖記之乃是寃枉囚人死魄入地聚為此物凝結不消縦鼓鑄不燃浸沃不濕刄之不入擊之轉堅經千百年間而不腐爛但於清夜致之酒食許以伸寃當有黒氣沖天不異豐城之劍氣也此非吉瑞之兆實為竄逐之徴公一一試之皆如其說遂復深瘞尋易營基後有拔城背主奔秦之兆亦由見怪之驗也鑒誡録卷九
