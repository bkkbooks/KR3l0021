body:
  text: 鑒誡録卷十後蜀何光逺撰歸生刺歸處納者歸侍郎融之曽孫也多逰秦隴言足是非在事者無不以金帛酒食彌縫之畏其譏也或見人衣鮮華即念詩曰昻藏騎馬出朱門服色鮮華不可論盡是殺人方始得一絲絲上有寃魂黃巢犯京後守亮守信等悉為楊軍容復恭義兒勢奪諸侯亦一時之威也歸有不平之色詠虺漢以刺之曰草頭灰面惡形儀盡是軍容表裏姿昔日水牛攀角上而今細馬劈腰騎錢多內藏猶嫌少位等三公尚厭卑更有一般堪笑處鍍金牙齒咬銀匙又詠奸漢云輕脣利舌傍吾門送諂承顔日日新愛與大官添弟子能將小藥獻夫人稱頭不放分毫過對酒常如割骨貧更有一般奸大處聚錢惟趂買金銀又代村婦詠邊將曰紫袍金帶不須誇動便經年鎮海涯爭似我家田舍壻朝驅牛去暮還家又有石校書欽若本東川人文章四六與王超齊名天復初應舉值大駕東遷蜀路不通干戈繼起遂客寄天水荏苒一紀有餘後知父亡方乃舉慟廣於寺院追薦懴罪而已歸與石遽因小隙荼毒詠之石氏聲名因兹減價詩曰十二年來匿父喪三千之罪譴莫當如今追薦因無益已被牛頭煮幾場髙僧論伏牛上人一鉢和尚皆悟達之士也一居巖岫永離囂塵著述三傷指諭一鉢廣開法廟大扇迷途聾瞽聞之往往解悟王蜀乾德初有小軍使陳失名妻髙氏即髙駢相公諸院之孫先於法門寺受持不殺戒二十餘年後届蜀因與男娶婦親族勸令屠宰髙亦從之旬日之中得疾頗異不録人事口但荒言既而三宿還魂備述幽途之事初遇黑衣使者追入岐府城隍廟神峩冠大神與一金甲武士對坐使者領髙見神武士言語紛紜訴髙破戒仍扼腕罵髙曰吾護戒鬼將也為汝二十餘年食不受羡寢不遑安豈期一起殺心頓隳戒行命雖未盡罪亦頗深須送冥司懲其僭犯城隍神回問髙曰汝更修何善贖此過尤髙平生常念上生經至此蔑然遺忘只記得三傷頌一鉢歌合掌向神厲聲而念神與武士聳耳立聽顔色漸怡誦至了終悉皆涕淚謂髙曰且歸人世宜復善心髙氏拜辭未終颯然起生乃知大善知識所著句義與佛齊功今並録其全篇仍亦書其靈驗採之真識非取迦談伏牛上人三傷頌其一曰傷嗟壘巢燕雖巧無深見修營一箇窠往復凡千轉雙飛碧水頭對語紅梁畔身緣覔食疲口為銜泥爛驅馳九十初方産巢中卵停騰怕饑渴撫養知寒暖憐惜過於人銜蟲餧皆遍父為理毛衣母來將食眩一旦翅翼成分飛不相管世有仁智人懇力憂家眷男女未成長顔色亦衰變燕子燕子聽吾語隨時且過休辛苦縱使窠中千箇兒秋風才動終須去世人世人不要貪此語是藥須思量饒你平生男女多誰能伴爾歸泉路其二曰傷嗟鵽鳩鳥夜夜啼天曉墜翼栁攀枝垂頭血沾草身隨露葉低影逐風枝裊一種情相生爾獨何枯槁驅驅飲啄稀役役飛騰少不是官所嗟都緣業所造亦似世間人貪生不覺老喫著能幾多强自索煩惱咄哉無眼人織絡何時了只為一六迷遂成十二到鵽鳩鵽鳩林裡叫山僧山僧牀上笑有人㑹意解推尋不假三祗便成道其三曰傷嗟造蜜蜂忙忙採花蕊接翼入芳叢分頭傍煙水抱蕊愛香滋尋花應春餌驅馳如所縈盤旋若邅魅蹭蹬遇絲羅飄零餵螻蟻才能翅翼成方始窠巢備惡人把火燒哀鳴𣗳中死蜜是他人蜜美自他人美虛忙百草頭於身有何利世有少智人與此恰相似只緣貪愛牽幾度虛沈墜百嵗處浮生十年作童稚一半悲與愁一半病與瘁除折算將來能得幾多子更將有漏身自翳無生理永不見如來却緣開眼睡蜜蜂蜜蜂休沒沒空哉終是他人喫世人世人不要貪留富他人有何益一鉢和尚歌曰阿剌剌閙聒聒總是悠悠造未撻如饑喫鹽加得渴枉却一生頭戛戛究竟不能知本末拋却死尸何處脫閒事到頭須結撮火落身上當頭撥莫待臨事呼菩薩大丈夫貌須豁落莫學癡人受摩捋也繫裹也擺撥也學柔和也粗糲亦解剃頭亦披褐也學凡夫作生活直言向君君未達更作長歌歌一鉢多中少少中多莫笑野人一鉢歌緣持此鉢度婆娑青天寥寥月初上此時境空含萬象幾處浮生自是非一源清净無來往莫漫將心學水泡百毛流火無事交不如靜坐真如他頭上從他鵲作巢萬代金輪聖王子只這真如是靈覺菩提𣗳下度衆生度盡衆生不生死真丈夫無形無相大毗盧塵滅勞盡真如在一顆圓眀無價珠眼不見耳不聞無見無聞無不聞從來一鉢無言說今日千言强為分强為分須諦聽人人總有真如性恰似黃金在礦中鍊去金金鉢净真是妄妄是真為求真妄更無求將心不用心煩惱衣食隨時養色身好也著惡也著一切不貪無染著亦無惡亦無好一際坦然平等道粗亦餐細亦餐莫學凡夫相上看亦無粗亦無細上方香積無根蒂坐亦行行亦坐生死𣗳是菩提果亦無生亦無死三世如來總如此離即著著即離實想門中無實義不可離不可著何處更求治病藥語時默默時語語默尋蹤無定所亦無語亦無默莫喚東西作南北嗔時喜喜時嗔我自降魔轉法輪亦無嗔亦無喜水不離波波是水慳時捨捨時慳不離內外與中間亦無慳亦無捨寂寂寥寥無可把苦時樂樂時苦只箇修行斷門户亦無苦亦無樂本來自性無纒縛垢即净净即垢兩邊惡境無前後亦無垢亦無净大千同一真如性藥是病病是藥到頭兩事渾捻却亦無藥亦無病正是真如靈覺性魔是佛佛是魔如影隨形水上波亦無魔亦無佛三教比來無一物凡即聖聖即凡色裡膠倩水裡礬亦無凡亦無聖萬行歸除無一行真中假假中真自是凡夫起惡塵亦無真亦無假若不呼時誰應者本無性本無名只麼騰騰信腳行有時市井看屠肆一葉蓮花火上生也曽䇿杖逰京洛身似浮雲先住著究竟從來是寄居他方處處無纒縛若覔戒三毒藥病何時瘥若覔禪我自縱橫大可憐不是住不是顛在世間中出世間時人不㑹此中意打著南邊與北邊若覔法雞足山頭問迦葉見說傳衣在彼中無心不用求謀甲若覔修八萬浮圖何處求只知黃葉上啼哭不覺黑雲遮日頭莫怪狂言無次第篩羅漸入粗中細只遮粗中細也無即是圓眀真是諦亦無真但有名聞即是塵若向塵中解真實便是當來出世人無造作獨行獨坐空索索無涅槃本來生死不相干直須省莫漫將身入空井無去來也無眀鏡掛髙臺儂家見解只如此不用將心算劫灰魚還肉天復初任可芝任戎州刺史日有漁人趙阿奴善釣大魚常於馬湖江垂巨索大釣號曰掣拔中釣者皆百斤不啻嘗謂人曰願釣千斤之魚豁男子平生之志即改業矣人或語曰此江非左海焉有此魚對曰非我所欲負命者上釣其年秋忽獲一鮥子魚果重千斤背上自然有字其文金色觀者感傷趙阿奴因此從軍遂改釣業其大魚背上字云三曽到揚州五轉歸馬湖身上千斤肉今還趙阿奴求冥婚傳言鬼神所慿有時而信故黃熊入夢不為無人豕人立啼顯彰有鬼蜀有曺孝廉第十九子晦因逰彭州導江縣汊口謁李永相公廟覩土塑三女儼然而艷遂指第三者祝曰願與小娘子為冥婚某終身不媾凡庶矣遂取卦子擲之相交而立良久巫者度語曰相公請曺郎留著體衣一事以為言定曺遂解汗衫留於女坐巫者復取女紅披衫與之曰望曺郎保惜此衣後二紀當就姻好曺亦深信竟不婚姻縱遇國色視之如糞土也果自天祐甲子終於癸未二十年間曺積覺氣微又疑與神􅉀約數乃自沐浴儼然衣冠俟神之迎也是日至暝車馬甚盛駢塞曺門同街居人競來觀矚至二更鄰人見曺升車而去莫知其由及曉視之曺已奄然矣議者以華嶽靈姻咸疑謬說苧蘿所遇亦恐妖稱今曺公冥婚目驗其異嗚呼自投鬼趣不亦卑乎見世報天祐中秦州劉自然主押義軍案因連帥李中令繼宗㸃鄉子而西捍蜀師有成紀縣百姓黃知感詣劉求免自然許之自然之妻謂其夫曰黃知感之妻美髮儻得為妾之髢即與免之知感得劉指蹤與妻平議黃妻可謂賢也語其夫曰妾今幸以弱質得附於君髮有再生人死永别君若南征不返妾有美髮何為言訖覽髮剪之知感亦懷痛切既迫於差㸃遂獻於劉劉亦貪殘獨為不足春獲其免秋復差行軍須急難莫敢中止於是沒於金沙之陳劉亦是嵗云亡黃妻但有靈祠陳狀咒詛後黃家牸衛忽生一駒及堪乘騎方覺左脅下有劉自然之字多般辨驗字益分眀邑人傳之遂達廉問自蜀平之後王太尉宗儔制置元戎召其妻子識認劉之長子曰某父平生惟好酒肉但能飲酒食肉是某父也驢遂飲酒數升啖肉數臠仍以頭指昵其子淚下如繩劉子請備百千贖之黃妻竟為不可出入鞭打以報夫仇劉子恥於姻親鬱咽而卒後纍經喪亂無復聞焉故王梵志曰欺狂得錢君莫羡究竟還是輸他便不信但看槽上驢只是改頭不識面又寶雞縣市令樊旭初喫犬肉臨老尾生每因校料之時取笑縣曺人吏其妻偶因夫醉以刀斷之忽作狗號數聲奄然而卒又金州義軍將全景暉能禁毒虺兼好食之其妻忽産大蛇九頭一尾又有室女忽生一子身有蛇鱗因此鄉親皆禁忌攻雜詠陳裕秀才下第逰蜀誓棄舉業惟事脣喙覩物便嘲其中數篇亦堪採擇雖無教化於當代誠可取笑於一時詠渾家樂云晨起梳頭午不休一窠精魅閙啾啾阿家解舞清平樂新婦能拋白木毬著緑桃牌吹觱篥賜緋􅉀器和梁州天晴任你渾家樂兩下還須滿舍愁又北郡南州處處過平生家計一驢馱囊中錢物衣裝少袋裡燕脂胡粉多滿子面甜唐脆餅蕭娘身瘦鬼嫦娥怪來喚作渾家樂骨子猫兒盡唱歌過舊居云昔日顔回宅今為裹飯家不聞吟秀句只見􅀈油麻豉汁􅀈中沸粕糕案上葩朝朝惟起早檐從自排衙有一秀才自贖酒家青衣為婦裕嘲之曰秀才何事太匆匆琴瑟無媒便自通新婦旋裙才離體外姑托布尚當胸菜團箇箇皆􅀈項粳米頭頭盡剪鬃一自土和逃走後至今笑却親家翁又詠大慈寺齊頭鮮於闍梨云酒肉中朝沒闕時髙堂大舍養肥尸行婆滿院多為婦童子成行半是兒面折掇齊窮措大笑迎搽粉阿尼師一朝苦也無常至劍𣗳刀山不放伊又大慈寺東北有池號曰放生池蜀人競以三元日多將鵝鴨放在池中浴因謁主池僧不遇當門書一絶句自此放生稍息矣鵝鴨同羣世所知蜀人競送放生池比來養狗囤雞在不信闍黎是野狸裕後詠深沙一絶因暴疾而終亦由神折天年抑又神其靈也詩曰撑睂努目强乾嗔便作閻浮有力神禍福豈由泥擔漢燒香供養弄蛇人蜀才婦吳越饒貢妓燕趙多美姝宋産歌姬蜀出才婦薛濤者容姿既麗才調尤佳言謔之間立有酬對大凡營妓比無校書之稱韋南康鎮成都日欲奏之而罷至今呼之故進士胡曽有詩曰萬里橋邊女校書琵琶花下閉門居掃睂才子知多少管領春風總不如濤每承連帥寵念或相唱和出入車輿詩達四方中朝一應銜命使車每届蜀求見濤者甚衆而濤性亦狂逸所有見遺金帛往往上納韋公既知且怒於是不許從官濤獻五離詩情意感人遂復寵召當時見重如此犬離主曰出入朱門四五年為知人性足人憐近緣咬著親情客不得紅絲毯上眠魚離池曰戲躍池中四五秋常將朱尾玩銀鈎近緣戲觸紅蓮折不得隨波更一逰鸚鵡離籠曰慣向侯門養此身飛來飛去羽毛新近緣出語無方便不得籠中再喚人又竹離叢曰蓊鬱裁成四五行常持堅節覆秋霜近緣春笋鑽階破不得垂枝對畫堂又珠離掌曰一顆眀珠內外通分眀皎潔水精宫近緣一㸃瑕相纍不得朝朝在掌中又女郎張窈窕少年居蜀下筆成章當時詩人雅相推重有上成都當事詩曰昨日賣衣裳今朝賣衣裳衣裳渾賣盡惟剩嫁時箱有賣愁仍緩無時心轉傷故園千里隔何處是柴桑悲光寺近有尼海印才思清俊不讓名流有舟夜一章頗佳詩曰水色連天色風聲并浪聲旅人歸思苦漁叟夢魂驚舉棹雲先到移舟月逐行旅吟詩句罷猶見逺山行鑒誡録卷十
